            <div className="card-title"><span className="ci">{'\ud83d\udd25'}</span> Streaks</div>
            <div className="stats-grid">
              <div className="stat-card glass amber"><div className="val">{an.streaks.currentStreak||0}</div><div className="lbl">Current</div></div>
              <div className="stat-card glass red"><div className="val">{an.streaks.longestStreak||0}</div><div className="lbl">Longest</div></div>
              <div className="stat-card glass purple"><div className="val">{an.streaks.totalActiveDays||0}</div><div className="lbl">Active Days</div></div>
              <div className="stat-card glass green"><div className="val">{an.streaks.currentStreak>=7?'\u2714':an.streaks.currentStreak>=3?'\u25cf':'\u25cb'}</div><div className="lbl">Status</div></div>
            </div>
            {/* Mini calendar - last 5 weeks */}
            {an.streaks.activeDates&&(()=>{
              const today=new Date();today.setHours(0,0,0,0);
              const activeSet=new Set(an.streaks.activeDates);
              const cells=[];
              for(let i=34;i>=0;i--){
                const d=new Date(today);d.setDate(d.getDate()-i);
                const key=d.toISOString().slice(0,10);
                const active=activeSet.has(key);
                const isToday=i===0;
                cells.push(<div key={i} title={key} style={{
                  width:12,height:12,borderRadius:2,
                  background:active?'rgba(160,124,255,.5)':'rgba(255,255,255,.03)',
                  boxShadow:active?'0 0 4px rgba(140,100,255,.3)':'none',
                  border:isToday?'1px solid var(--iris)':'1px solid transparent',
                  transition:'all .2s'
                }}/>);
              }
              return <div style={{display:'flex',gap:2,justifyContent:'center',flexWrap:'wrap',padding:'8px 0'}}>{cells}</div>;
            })()}
          </div>:<div className="card glass"><div className="card-title"><span className="ci">{'\ud83d\udd25'}</span> Streaks</div><Skeleton type="stats"/></div>}

          {/* Period Comparison */}
          {an.comparison&&<div className="card glass">
            <div className="card-title"><span className="ci">{'\u2194'}</span> Period Comparison</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {(()=>{
                const cmp=an.comparison;
                const wkDiff=cmp.thisWeek.totalSec-cmp.lastWeek.totalSec;
                const moDiff=cmp.thisMonth.totalSec-cmp.lastMonth.totalSec;
                const arrow=(v)=>v>0?'\u25b2':v<0?'\u25bc':'\u25cf';
                const color=(v)=>v>0?'var(--grn)':v<0?'var(--red)':'var(--mute)';
                return <>
                  <div className="glass" style={{padding:12,borderRadius:'var(--r)',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'var(--mute)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}}>This Week</div>
                    <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700}}>{fmtSec(cmp.thisWeek.totalSec)}</div>
                    <div style={{fontSize:10,color:color(wkDiff),fontFamily:'var(--mono)',marginTop:2}}>
                      {arrow(wkDiff)} {wkDiff>0?'+':''}{Math.round(wkDiff/60)}min vs last week
                    </div>
                    <div style={{fontSize:9,color:'var(--mute)',marginTop:4}}>{cmp.thisWeek.sessions} sessions \u00b7 {cmp.thisWeek.videos} videos</div>
                  </div>
                  <div className="glass" style={{padding:12,borderRadius:'var(--r)',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'var(--mute)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}}>This Month</div>
                    <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700}}>{fmtSec(cmp.thisMonth.totalSec)}</div>
                    <div style={{fontSize:10,color:color(moDiff),fontFamily:'var(--mono)',marginTop:2}}>
                      {arrow(moDiff)} {moDiff>0?'+':''}{Math.round(moDiff/60)}min vs last month
                    </div>
                    <div style={{fontSize:9,color:'var(--mute)',marginTop:4}}>{cmp.thisMonth.sessions} sessions \u00b7 {cmp.thisMonth.videos} videos</div>
                  </div>
                </>;
              })()}
            </div>
          </div>}

          {/* Goals */}
          <GoalsCard goals={an.goals} doCmd={doCmd}/>

          {/* Milestones */}
          {an.milestones&&an.milestones.length>0&&<div className="card glass">
            <div className="card-title"><span className="ci">{'\ud83c\udfc6'}</span> Milestones</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:6}}>
              {an.milestones.filter(m=>m.progress>0).map((m,i)=>(
                <div key={i} className="glass" style={{padding:'8px 10px',borderRadius:'var(--r)',opacity:m.reached?1:.6}}>
                  <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:4}}>
                    <span style={{fontSize:14}}>{m.reached?'\u2b50':m.type==='hours'?'\u23f1':'\ud83d\udd25'}</span>
                    <span style={{fontSize:10,fontWeight:600,color:m.reached?'var(--iris)':'var(--dim)'}}>
                      {m.target}{m.type==='hours'?'h':' day'} {m.type==='streak'?'streak':'watched'}
                    </span>
                  </div>
                  <div style={{height:3,borderRadius:3,background:'rgba(255,255,255,.05)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:m.progress+'%',borderRadius:3,
                      background:m.reached?'var(--grn)':'linear-gradient(90deg,var(--v2),var(--iris))',
                      transition:'width .5s ease'}}/>
                  </div>
                  <div style={{fontSize:8,color:'var(--mute)',fontFamily:'var(--mono)',textAlign:'right',marginTop:2}}>{m.progress}%</div>
                </div>
              ))}
            </div>
          </div>}

          {/* Watch Time Trend with date range picker */}
          <div className="card glass">
            <div className="card-title" style={{marginBottom:4}}>
              <span className="ci">{'\u2191'}</span> Watch Time Trend
              <div style={{marginLeft:'auto',display:'flex',gap:4}}>
                {[7,30,90,365].map(d=>(
                  <button key={d} className={`btn ${trendDays===d?'btn-p':'btn-g'}`}
                    style={{padding:'3px 8px',fontSize:9}}
                    onClick={()=>{setTrendDays(d);loadAnalytics(d)}}>{d===365?'1Y':d+'d'}</button>
                ))}
              </div>
            </div>
            <TrendChart data={an.dailyTrend}/>
          </div>

          {/* Session Heatmap */}
          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u29bf'}</span> Session Heatmap</div>
            <SessionHeatmap data={an.heatmap}/>
          </div>

          {/* Session Patterns */}
          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u2606'}</span> Session Patterns</div>
            <div className="stats-grid">
              {(()=>{const sess=an.sessions||[];const avgDur=sess.length?Math.round(sess.reduce((s,x)=>s+x.durationSec,0)/sess.length):0;
                const cr=an.completionRates||[];const avgCr=cr.length?Math.round(cr.reduce((s,x)=>s+x.rate,0)/cr.length):0;
                const tv=an.topVideos||[];const totalSkips=tv.reduce((s,x)=>s+(x.skipped||0),0);const totalPlays=tv.reduce((s,x)=>s+(x.plays||0),0);
                const skipRate=totalPlays>0?Math.round(totalSkips/totalPlays*100):0;
                let sessWk='\u2014';if(sess.length>=2){const o=new Date(sess[sess.length-1].startedAt),n=new Date(sess[0].startedAt);const days=Math.max(1,(n-o)/864e5);sessWk=(sess.length/days*7).toFixed(1)}
                return <>
                  <div className="stat-card glass purple"><div className="val">{fmtSec(avgDur)}</div><div className="lbl">Avg Duration</div></div>
                  <div className="stat-card glass blue"><div className="val">{sessWk}</div><div className="lbl">Sessions/Wk</div></div>
                  <div className="stat-card glass amber"><div className="val">{skipRate}%</div><div className="lbl">Skip Rate</div></div>
                  <div className="stat-card glass green"><div className="val">{avgCr}%</div><div className="lbl">Completion</div></div>
                </>;
              })()}
            </div>
          </div>

          {/* Session Timeline */}
          {(an.sessions||[]).length>0&&<div className="card glass">
            <div className="card-title"><span className="ci">{'\u23f3'}</span> Session Timeline</div>
            <div style={{maxHeight:250,overflowY:'auto'}}>
              {(an.sessions||[]).slice(0,30).map((s,i)=>{
                const maxDur=Math.max(1,...(an.sessions||[]).map(x=>x.durationSec));
                const pct=Math.max(2,s.durationSec/maxDur*100);
                return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,.02)'}}>
                  <span style={{fontSize:9,color:'var(--mute)',fontFamily:'var(--mono)',minWidth:52,flexShrink:0}}>{fmtLocal(s.startedAt)}</span>
                  <div style={{flex:1,height:8,borderRadius:4,background:'rgba(255,255,255,.04)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:pct+'%',borderRadius:4,
                      background:s.panic?'linear-gradient(90deg,var(--red),rgba(255,61,90,.4))':'linear-gradient(90deg,var(--v2),var(--iris))',
                      transition:'width .4s ease'}}/>
                  </div>
                  <span style={{fontSize:9,color:s.panic?'var(--red)':'var(--dim)',fontFamily:'var(--mono)',minWidth:40,textAlign:'right'}}>{fmtSec(s.durationSec)}</span>
                  <span style={{fontSize:8,color:'var(--mute)',minWidth:16}}>{s.videos}v</span>
                </div>;
              })}
            </div>
          </div>}

          {/* Top Videos (clickable for detail) */}
          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u2606'}</span> Top Videos</div>
            <div style={{maxHeight:220,overflowY:'auto'}}>
              {(an.topVideos||[]).slice(0,20).map((v,i)=>{
                const maxPlays=Math.max(1,...(an.topVideos||[]).map(x=>x.plays));
                return <div key={i} className="tv-item" style={{cursor:'pointer'}} onClick={()=>loadVideoDetail(v.url)}>
                  <span className="tv-rank">{i+1}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="tv-url" title={v.url}>{trunc(v.url,45)}</div>
                    <div style={{height:3,borderRadius:3,background:'rgba(255,255,255,.04)',marginTop:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:Math.round(v.plays/maxPlays*100)+'%',borderRadius:3,background:'linear-gradient(90deg,var(--v2),var(--iris))'}}/>
                    </div>
                  </div>
                  <span className="tv-stats">{v.plays}x {v.completionRate}%</span>
                </div>;
              })}
              {!(an.topVideos?.length)&&<div style={{color:'var(--dim)',fontSize:11}}>No data yet.</div>}
            </div>
          </div>

          {/* Watch History */}
          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u23f3'}</span> Watch History</div>
            <div style={{maxHeight:200,overflowY:'auto'}}>
              {(st.recentHistory||[]).slice(0,100).map((h,i)=>
                <div key={i} className="hist-item"><span className="hist-time">{fmtLocal(h.lastWatched)}</span><span className="hist-url" title={h.url}>{trunc(h.url,55)}</span></div>
              )}
              {!(st.recentHistory?.length)&&<div style={{color:'var(--dim)',fontSize:11}}>No history yet.</div>}
            </div>
          </div>

          {/* Video Detail Modal */}
          {videoDetail&&<div style={{position:'fixed',inset:0,zIndex:9997,background:'rgba(0,0,0,.8)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={e=>{if(e.target===e.currentTarget)setVideoDetail(null)}}>
            <div className="glass" style={{maxWidth:500,width:'100%',padding:24,maxHeight:'80vh',overflowY:'auto',animation:'rise .3s ease'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div className="card-title" style={{margin:0}}><span className="ci">{'\ud83c\udfac'}</span> Video Detail</div>
                <button className="btn btn-g" onClick={()=>setVideoDetail(null)}>{'\u2715'}</button>
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)',wordBreak:'break-all',marginBottom:14,padding:8,background:'rgba(255,255,255,.02)',borderRadius:'var(--r)'}}>{videoDetail.url}</div>
              <div style={{fontSize:11,color:'var(--mute)',marginBottom:8}}>{videoDetail.plays?.length||0} plays recorded</div>
              {(videoDetail.plays||[]).map((p,i)=>{
                const watchPct=p.videoLenSec>0?Math.round(p.durationSec/p.videoLenSec*100):0;
                return <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.02)',fontSize:10}}>
                  <span style={{color:'var(--mute)',fontFamily:'var(--mono)',minWidth:65}}>{fmtLocal(p.startedAt)}</span>
                  <div style={{flex:1,height:6,borderRadius:3,background:'rgba(255,255,255,.04)',overflow:'hidden'}}>
                    <div style={{height:'100%',width:Math.min(100,watchPct)+'%',borderRadius:3,
                      background:p.completed?'var(--grn)':p.skipped?'var(--red)':'var(--iris)'}}/>
                  </div>
                  <span style={{fontFamily:'var(--mono)',color:p.completed?'var(--grn)':p.skipped?'var(--red)':'var(--dim)',minWidth:36,textAlign:'right'}}>{fmtSec(p.durationSec)}</span>
                  <span style={{fontSize:8,color:'var(--mute)',minWidth:20}}>{watchPct}%</span>
                </div>;
              })}
            </div>
          </div>}

        </div>


        {/* ═══ CONTROLS ═══ */}
        <div className={`tab-pane ${tab==='ctrl'?'active':''}`}>
          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u23ef'}</span> Remote</div>
            <div className="remote">
              <button className="rbtn" onClick={()=>doCmd('skip')}><span className="ri">{'\u23ed'}</span>Skip</button>
              <button className="rbtn" onClick={()=>doCmd('clearqueue')}><span className="ri">{'\u2715'}</span>Clear Queue</button>
              <button className="rbtn accent" onClick={()=>doCmd('panic')}><span className="ri">{'\u26a0'}</span>Panic</button>
            </div>
          </div>

          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u266b'}</span> Sliders</div>
            <SliderRow label="Volume" min={0} max={200} value={o.volume??100} onChange={v=>doCmd('volume',v,true)} format={v=>v}/>
            <SliderRow label="Speed" min={25} max={150} value={o.speed?Math.round(o.speed*100):100} onChange={v=>doCmd('speed',+(v/100).toFixed(2),true)} format={v=>(v/100).toFixed(2)+'\u00d7'}/>
          </div>

          <div className="card glass">
            <div className="card-title"><span className="ci">{'\ud83d\udd12'}</span> Lock / Unlock</div>
            <div style={{marginBottom:10,fontSize:13,color:st.panicLocked?'var(--red)':'var(--grn)',fontFamily:'var(--mono)'}}>
              {st.panicLocked?'\ud83d\udd12 PANIC LOCKED':'\ud83d\udd13 Panic hotkey active'}
            </div>
            <div className="row">
              <button className="btn btn-d" onClick={()=>{if(confirm('Lock panic hotkey?'))doCmd('lock')}}>{'\ud83d\udd12'} Lock</button>
              <button className="btn btn-s" onClick={()=>doCmd('unlock')}>{'\ud83d\udd13'} Unlock</button>
            </div>
          </div>

          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u25b6'}</span> Play From Playlist</div>
            <button className="btn btn-p" style={{width:'100%'}} onClick={()=>{if(confirm('Clear queue and start playlist?'))doCmd('playnow')}}>Start Playing Playlist Now</button>
          </div>

          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u2699'}</span> Session Options</div>
            <ToggleRow label="Loop Playlist" checked={o.loop} onChange={v=>doCmd('loop',v)}/>
            <ToggleRow label="Shuffle" checked={plSettings.shuffle} onChange={v=>doCmd('shuffle',v)}/>
            <ToggleRow label="No Repeat" checked={plSettings.noRepeat} onChange={v=>doCmd('norepeat',v)}/>
            <ToggleRow label="Show Cursor" checked={o.cursorShow} onChange={v=>doCmd('cursorshow',v)}/>
            <div style={{marginTop:12}}>
              <NumRow label="Min Session Lock" unit="sec" defVal={o.minSession||0} onSet={v=>doCmd('minsession',v)} info="Panic disabled for N sec"/>
              <NumRow label="Max Time" unit="min" defVal={o.maxTime||0} onSet={v=>doCmd('maxtime',v)} info="0 = no limit"/>
              <NumRow label="Extend" unit="min" defVal={15} onSet={v=>doCmd('extend',v)} info="Add minutes"/>
              <NumRow label="Max Videos" defVal={plSettings.maxVideos||0} onSet={v=>doCmd('maxvideos',v)} info="0 = unlimited"/>
              <NumRow label="Start From" defVal={plSettings.startFrom||0} onSet={v=>doCmd('startfrom',v)} info="Skip first N"/>
            </div>
          </div>

          <ProfilesCard profiles={profiles} doCmd={doCmd} currentOptions={o} plSettings={plSettings}/>

          <MarqueeCard marquee={o.marqueeText} doCmd={doCmd}/>

          <ScheduleCard weekSched={weekSched} setWeekSched={setWeekSched} doCmd={doCmd} schedDirtyRef={schedDirtyRef}/>

          <IdleChainCard doCmd={doCmd} idleSeconds={st.idleSeconds} chainConfig={st.chainConfig}/>

          <BackupCard doCmd={doCmd}/>

          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u21bb'}</span> Reset</div>
            <button className="btn btn-d" style={{width:'100%'}} onClick={()=>{if(confirm('Reset ALL settings to defaults?'))doCmd('reset')}}>{'\u27f3'} Reset All Settings to Defaults</button>
          </div>
        </div>

        {/* ═══ PLAYLIST ═══ */}
        <div className={`tab-pane ${tab==='list'?'active':''}`}>
          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u25b6'}</span> Now Playing</div>
            <div className="mq-preview" style={{color:st.currentUrl?'var(--txt)':'var(--mute)'}}>{st.currentUrl||'\u2014'}</div>
            <div className="row"><button className="btn btn-g" onClick={()=>doCmd('skip')}>{'\u23ed'} Skip</button><button className="btn btn-d" onClick={()=>doCmd('clearqueue')}>{'\u2715'} Clear Queue</button></div>
          </div>

          <QueueCard items={st.queueItems} doCmd={doCmd}/>
          <PlaylistCard playlist={playlist} plOp={plOp} loadPl={loadPl}/>
          <FoldersCard doCmd={doCmd}/>

          <div className="card glass">
            <div className="card-title"><span className="ci">{'\u2699'}</span> Playlist Settings</div>
            <ToggleRow label="Shuffle" checked={plSettings.shuffle} onChange={v=>doCmd('shuffle',v)}/>
            <ToggleRow label="No Repeat" checked={plSettings.noRepeat} onChange={v=>doCmd('norepeat',v)}/>
            <NumRow label="Max Videos" defVal={plSettings.maxVideos||0} onSet={v=>doCmd('maxvideos',v)} info="0 = unlimited"/>
            <NumRow label="Start From" defVal={plSettings.startFrom||0} onSet={v=>doCmd('startfrom',v)} info="0 = beginning"/>
          </div>
        </div>
      </div>
      </PullToRefresh>

      {/* Floating Panic */}
      <button className="fab-panic" onClick={()=>{haptic(50);doCmd('panic')}} title="Panic Stop">{'\u26a0'}</button>
    </div>

    {/* PWA Install Banner */}
    {showInstallBanner&&!isStandalone&&<div className="install-banner">
      <span style={{fontSize:24}}>{isIos?'\u2b06':'\ud83d\udcf1'}</span>
      <div className="ib-text">
        {isIos?<>
          <strong>Install VoidCapture</strong>
          Tap <span style={{fontWeight:700,color:'var(--iris)'}}>Share</span> <span style={{fontSize:16}}>{'\u2b06'}</span> then <span style={{fontWeight:700,color:'var(--iris)'}}>Add to Home Screen</span>
        </>:<>
          <strong>Install VoidCapture</strong>
          Add to your home screen for instant access
        </>}
      </div>
      {!isIos&&<button className="btn btn-p" onClick={doInstall}>Install</button>}
      <button className="btn btn-g" onClick={dismissInstall}>{'\u2715'}</button>
    </div>}

    {/* Guide */}
    <div className={`guide-overlay ${guide?'open':''}`} onClick={e=>{if(e.target===e.currentTarget)setGuide(false)}}>
      <div className="guide-inner glass">
        <button className="btn btn-g" style={{position:'absolute',top:12,right:12}} onClick={()=>setGuide(false)}>{'\u2715'} Close</button>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--iris)',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:4}}>VoidCapture</div>
        <h2>Controller Guide</h2>
        <div className="gs">{'\u25c8'} Getting Connected</div><p>Enter the Tunnel URL, Code, and PIN from the desktop app. Only one controller can be connected at a time.</p>
        <div className="gs">{'\u25ce'} Controls</div><p><strong>Skip</strong> \u2014 next video. <strong>Clear Queue</strong> \u2014 removes waiting videos. <strong>Panic</strong> \u2014 stops everything immediately. Volume (0\u2013200) and Speed (0.25\u20131.5\u00d7) adjust in real-time.</p>
        <div className="gs">{'\ud83d\udd12'} Lock / Unlock</div><p>Lock disables the panic hotkey. The 3-second emergency hold (Ctrl+Shift+Esc) always works.</p>
        <div className="gs">{'\u2699'} Options</div><p><strong>Loop</strong>, <strong>Shuffle</strong>, <strong>No Repeat</strong>, <strong>Show Cursor</strong>, <strong>Min Session Lock</strong>, <strong>Max Videos</strong>, <strong>Max Time</strong>.</p>
        <div className="gs">{'\u23f1'} Schedule</div><p>Start Now, timed start, idle auto-start. The <strong>weekly grid</strong> lets you tap cells to set recurring schedules visually.</p>
        <div className="gs">{'\u21bb'} Reset</div><p>Restores all settings to defaults.</p>
        <div className="gs">{'\ud83d\udee1'} Security</div><p>All traffic encrypted via Cloudflare HTTPS. Sessions auto-expire within 15 seconds of disconnect.</p>
      </div>
    </div>

    <ToastContainer/>
  </>;
}

/* ─── Reusable Components ─── */
function SliderRow({label,min,max,value,onChange,format}){
  const [local,setLocal]=useState(value);
  const timerRef=useRef();
  useEffect(()=>setLocal(value),[value]);
  const handle=v=>{setLocal(v);clearTimeout(timerRef.current);timerRef.current=setTimeout(()=>onChange(v),150)};
  return <div className="slider-row"><span className="label">{label}</span><input type="range" min={min} max={max} value={local} onChange={e=>handle(+e.target.value)}/><span className="val">{format(local)}</span></div>;
}

function ToggleRow({label,checked,onChange}){
  return <div className="toggle-row"><span className="toggle-label">{label}</span><label className="switch"><input type="checkbox" checked={!!checked} onChange={e=>onChange(e.target.checked)}/><span/></label></div>;
}

function NumRow({label,unit,defVal,onSet,info}){
  const [v,setV]=useState(defVal);
  useEffect(()=>setV(defVal),[defVal]);
  return <div className="num-row"><span className="info"><strong>{label}</strong>{info}</span><input type="number" value={v} onChange={e=>setV(+e.target.value)} min={0}/>{unit&&<span style={{color:'var(--mute)',fontSize:10}}>{unit}</span>}<button className="btn btn-g" onClick={()=>onSet(v)}>Set</button></div>;
}

/* ─── Skeleton Loading ─── */
function Skeleton({type='text',count=3}){
  if(type==='stats')return <div className="stats-grid">{Array.from({length:4},(_,i)=><div key={i} className="skeleton skel-stat"/>)}</div>;
  if(type==='chart')return <div className="skeleton skel-chart"/>;
  return <>{Array.from({length:count},(_,i)=><div key={i} className="skeleton skel-row"/>)}</>;
}

/* ─── Session Profiles ─── */
function ProfilesCard({profiles,doCmd,currentOptions,plSettings}){
  const [saving,setSaving]=useState(false);
  const [newName,setNewName]=useState('');

  const saveCurrent=()=>{
    const name=newName.trim();
    if(!name){toast('Enter a profile name','err');return}
    const profile={
      name,
      volume:currentOptions.volume??100,
      speed:currentOptions.speed??1,
      loop:!!currentOptions.loop,
      maxTime:currentOptions.maxTime||0,
      minSession:currentOptions.minSession||0,
      cursorShow:!!currentOptions.cursorShow,
      marquee:currentOptions.marqueeText||'',
      shuffle:!!plSettings?.shuffle,
      noRepeat:!!plSettings?.noRepeat,
    };
    doCmd('saveprofile',JSON.stringify(profile));
    setSaving(false);setNewName('');
  };

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\ud83d\udcbe'}</span> Session Profiles</div>
    {(profiles||[]).length>0&&<div style={{marginBottom:10}}>
      {profiles.map((p,i)=>{
        const name=p.name||'Unnamed';
        return <div key={name} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',marginBottom:4,
          borderRadius:'var(--r)',background:'var(--card2)',border:'1px solid var(--bdr)',transition:'all .2s'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--txt)',marginBottom:2}}>{name}</div>
            <div style={{fontSize:9,color:'var(--mute)',fontFamily:'var(--mono)'}}>
              Vol:{p.volume||100} Spd:{p.speed||1}{'\u00d7'} {p.loop?'Loop ':''}
              {p.shuffle?'Shuffle ':''}{p.maxTime?`Max:${p.maxTime}m `:''}
              {p.marquee?`"${p.marquee.slice(0,15)}" `:''}
            </div>
          </div>
          <button className="btn btn-p" style={{padding:'5px 12px'}} onClick={()=>{haptic(15);doCmd('loadprofile',name)}}>Load</button>
          <button className="btn btn-d" style={{padding:'5px 8px',fontSize:10}} onClick={()=>{if(confirm(`Delete "${name}"?`))doCmd('deleteprofile',name)}}>{'\u2715'}</button>
        </div>;
      })}
    </div>}
    {!profiles?.length&&!saving&&<div style={{color:'var(--mute)',fontSize:12,padding:'8px 0',textAlign:'center'}}>No profiles saved</div>}
    {saving?<div style={{padding:'10px 0'}}>
      <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Profile name (e.g. Nightly Deep)" style={{width:'100%',marginBottom:8}} onKeyDown={e=>e.key==='Enter'&&saveCurrent()}/>
      <div style={{fontSize:9,color:'var(--mute)',marginBottom:8}}>Saves current: volume, speed, loop, shuffle, max time, min session, cursor, marquee</div>
      <div className="row"><button className="btn btn-p" onClick={saveCurrent}>Save Profile</button><button className="btn btn-g" onClick={()=>{setSaving(false);setNewName('')}}>Cancel</button></div>
    </div>:
    <button className="btn btn-g" style={{width:'100%',marginTop:4}} onClick={()=>setSaving(true)}>+ Save Current Settings as Profile</button>}
  </div>;
}

/* ─── Backup / Restore ─── */
function BackupCard({doCmd}){
  const [restoreData,setRestoreData]=useState('');
  const [showRestore,setShowRestore]=useState(false);
  const [exporting,setExporting]=useState(false);

  const doBackup=async()=>{
    setExporting(true);
    try{
      const res=await doCmd('backup',null,true);
      // The backup data comes back as the result message
      if(res){
        try{navigator.clipboard?.writeText(res)}catch(e){}
        // Also offer as download
        const blob=new Blob([res],{type:'text/plain'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='voidcapture-backup-'+new Date().toISOString().slice(0,10)+'.vcb';
        a.click();URL.revokeObjectURL(a.href);
        toast('Backup downloaded','ok');
      }
    }catch(e){toast('Backup failed','err')}
    setExporting(false);
  };

  const doRestore=()=>{
    if(!restoreData.trim()){toast('Paste backup data first','err');return}
    if(!confirm('Restore will overwrite current data. Continue?'))return;
    doCmd('restore',restoreData.trim());
    setShowRestore(false);setRestoreData('');
  };

  const handleFile=e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>setRestoreData(reader.result);
    reader.readAsText(file);
  };

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\ud83d\udcbe'}</span> Backup & Restore</div>
    <div className="row" style={{marginBottom:8}}>
      <button className="btn btn-p" onClick={doBackup} disabled={exporting} style={{flex:1}}>
        {exporting?'Exporting...':'\u2b07 Export Backup'}
      </button>
      <button className="btn btn-g" onClick={()=>setShowRestore(!showRestore)} style={{flex:1}}>
        {'\u2b06'} Restore Backup
      </button>
    </div>
    {showRestore&&<div style={{padding:'8px 0'}}>
      <div style={{fontSize:10,color:'var(--mute)',marginBottom:6}}>Upload a .vcb backup file or paste backup data:</div>
      <input type="file" accept=".vcb,.txt" onChange={handleFile} style={{marginBottom:6,fontSize:10,color:'var(--dim)'}}/>
      <textarea value={restoreData} onChange={e=>setRestoreData(e.target.value)} rows={3} placeholder="Or paste backup data here..." style={{fontSize:10,fontFamily:'var(--mono)'}}/>
      <div className="row" style={{marginTop:6}}>
        <button className="btn btn-p" onClick={doRestore}>Restore Now</button>
        <button className="btn btn-g" onClick={()=>{setShowRestore(false);setRestoreData('')}}>Cancel</button>
      </div>
    </div>}
    <div style={{fontSize:9,color:'var(--mute)',marginTop:4}}>Exports all settings, profiles, schedules, playlists, analytics. Encrypted with Windows DPAPI.</div>
  </div>;
}

/* ─── Idle & Chain Config ─── */
function IdleChainCard({doCmd,idleSeconds,chainConfig}){
  const chain=chainConfig?JSON.parse(chainConfig||'{}'):{};
  const [chainProfile,setChainProfile]=useState(chain.profile||'');
  const [chainCooldown,setChainCooldown]=useState(chain.cooldownMinutes||5);

  const saveChain=()=>{
    if(!chainProfile.trim()){doCmd('clearchainconfig');toast('Chain disabled','inf');return}
    doCmd('setchainconfig',JSON.stringify({profile:chainProfile.trim(),cooldownMinutes:chainCooldown}));
  };

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\u23f1'}</span> Automation</div>
    <div style={{fontSize:11,color:'var(--dim)',marginBottom:8}}>
      System idle: <span style={{fontFamily:'var(--mono)',color:'var(--iris)'}}>{idleSeconds!=null?`${Math.floor(idleSeconds/60)}m ${idleSeconds%60}s`:'\u2014'}</span>
    </div>
    <div style={{fontSize:10,color:'var(--mute)',marginBottom:12}}>
      Idle auto-start is configured via the Idle Start setting above. When your system is idle for that duration, a session starts automatically from your playlist.
    </div>
    <div style={{borderTop:'1px solid var(--bdr)',paddingTop:10,marginTop:4}}>
      <div style={{fontSize:11,fontWeight:600,color:'var(--txt)',marginBottom:6}}>Session Chaining</div>
      <div style={{fontSize:10,color:'var(--mute)',marginBottom:8}}>When a session ends, auto-load a profile after a cooldown.</div>
      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
        <input type="text" value={chainProfile} onChange={e=>setChainProfile(e.target.value)} placeholder="Profile name to chain" style={{flex:1,fontSize:11}}/>
        <input type="number" value={chainCooldown} onChange={e=>setChainCooldown(+e.target.value)} min={1} max={120} style={{width:50,fontSize:11,textAlign:'center'}}/>
        <span style={{fontSize:9,color:'var(--mute)'}}>min</span>
      </div>
      <div className="row">
        <button className="btn btn-p" onClick={saveChain} style={{fontSize:10}}>Save Chain</button>
        <button className="btn btn-g" onClick={()=>{setChainProfile('');doCmd('clearchainconfig')}} style={{fontSize:10}}>Clear</button>
      </div>
    </div>
  </div>;
}

/* ─── Playlist Folders ─── */
function FoldersCard({doCmd}){
  const [folders,setFolders]=useState([]);
  const [creating,setCreating]=useState(false);
  const [newName,setNewName]=useState('');
  const [newUrls,setNewUrls]=useState('');
  const [loaded,setLoaded]=useState(false);

  const loadFolders=async()=>{
    try{
      const res=await doCmd('getfolders',null,true);
      if(res){
        try{setFolders(JSON.parse(res))}catch(e){setFolders([])}
      }
    }catch(e){}
    setLoaded(true);
  };

  useEffect(()=>{loadFolders()},[]);

  const saveFolder=()=>{
    const name=newName.trim();
    if(!name){toast('Enter a folder name','err');return}
    const urls=newUrls.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
    if(!urls.length){toast('Add at least one URL','err');return}
    const updated=[...folders.filter(f=>f.name!==name),{name,urls,count:urls.length}];
    doCmd('savefolders',JSON.stringify(updated),true);
    setFolders(updated);
    setCreating(false);setNewName('');setNewUrls('');
    toast('Folder saved','ok');
  };

  const deleteFolder=(name)=>{
    if(!confirm(`Delete folder "${name}"?`))return;
    const updated=folders.filter(f=>f.name!==name);
    doCmd('savefolders',JSON.stringify(updated),true);
    setFolders(updated);
  };

  const loadFolder=(name)=>{
    if(!confirm(`Load "${name}" into active playlist? This replaces current playlist.`))return;
    doCmd('loadfolder',name);
  };

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\ud83d\udcc1'}</span> Playlist Folders</div>
    {folders.length>0&&<div style={{marginBottom:8}}>
      {folders.map((f,i)=>(
        <div key={f.name} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',marginBottom:4,
          borderRadius:'var(--r)',background:'var(--card2)',border:'1px solid var(--bdr)'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--txt)'}}>{f.name}</div>
            <div style={{fontSize:9,color:'var(--mute)',fontFamily:'var(--mono)'}}>{f.urls?.length||0} URLs</div>
          </div>
          <button className="btn btn-p" style={{padding:'4px 10px',fontSize:10}} onClick={()=>loadFolder(f.name)}>Load</button>
          <button className="btn btn-d" style={{padding:'4px 6px',fontSize:10}} onClick={()=>deleteFolder(f.name)}>{'\u2715'}</button>
        </div>
      ))}
    </div>}
    {!folders.length&&loaded&&!creating&&<div style={{color:'var(--mute)',fontSize:11,padding:'8px 0',textAlign:'center'}}>No folders saved. Create one to organize playlists.</div>}
    {creating?<div style={{padding:'8px 0'}}>
      <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Folder name (e.g. Favorites, Weekend Mix)" style={{marginBottom:6}}/>
      <textarea value={newUrls} onChange={e=>setNewUrls(e.target.value)} rows={5} placeholder="Paste URLs, one per line..." style={{fontSize:10,fontFamily:'var(--mono)'}}/>
      <div style={{fontSize:9,color:'var(--mute)',margin:'4px 0'}}>{newUrls.split('\n').filter(l=>l.trim().startsWith('http')).length} valid URLs</div>
      <div className="row">
        <button className="btn btn-p" onClick={saveFolder}>Save Folder</button>
        <button className="btn btn-g" onClick={()=>{setCreating(false);setNewName('');setNewUrls('')}}>Cancel</button>
      </div>
    </div>:
    <button className="btn btn-g" style={{width:'100%',marginTop:4}} onClick={()=>setCreating(true)}>+ Create Folder</button>}
  </div>;
}

/* ─── Goals Card ─── */
function GoalsCard({goals,doCmd}){
  const [editing,setEditing]=useState(false);
  const [daily,setDaily]=useState(goals?.dailyMinutes||0);
  const [weekly,setWeekly]=useState(goals?.weeklySessions||0);

  useEffect(()=>{
    if(goals){setDaily(goals.dailyMinutes||0);setWeekly(goals.weeklySessions||0)}
  },[goals]);

  const save=()=>{
    doCmd('setgoals',JSON.stringify({dailyMinutes:daily,weeklySessions:weekly}));
    setEditing(false);
  };

  if(!goals&&!editing)return <div className="card glass">
    <div className="card-title"><span className="ci">{'\ud83c\udfaf'}</span> Goals</div>
    <button className="btn btn-p" style={{width:'100%'}} onClick={()=>setEditing(true)}>Set Daily & Weekly Goals</button>
  </div>;

  if(editing)return <div className="card glass">
    <div className="card-title"><span className="ci">{'\ud83c\udfaf'}</span> Set Goals</div>
    <NumRow label="Daily Target" unit="min" defVal={daily} onSet={v=>setDaily(v)} info="Minutes per day"/>
    <NumRow label="Weekly Sessions" defVal={weekly} onSet={v=>setWeekly(v)} info="Sessions per week"/>
    <div className="row" style={{marginTop:8}}><button className="btn btn-p" onClick={save}>Save Goals</button><button className="btn btn-g" onClick={()=>setEditing(false)}>Cancel</button>
    <button className="btn btn-d" onClick={()=>{doCmd('cleargoals');setEditing(false)}}>Clear Goals</button></div>
  </div>;

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\ud83c\udfaf'}</span> Goals <button className="btn btn-g" style={{marginLeft:'auto',padding:'2px 8px',fontSize:9}} onClick={()=>setEditing(true)}>{'\u270e'}</button></div>
    {goals.dailyMinutes>0&&<div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
        <span style={{color:'var(--dim)'}}>Daily: {goals.dailyActualMin}/{goals.dailyMinutes} min</span>
        <span style={{color:goals.dailyProgress>=100?'var(--grn)':'var(--iris)',fontFamily:'var(--mono)',fontWeight:600}}>{goals.dailyProgress}%</span>
      </div>
      <div style={{height:6,borderRadius:6,background:'rgba(255,255,255,.04)',overflow:'hidden'}}>
        <div style={{height:'100%',width:Math.min(100,goals.dailyProgress)+'%',borderRadius:6,
          background:goals.dailyProgress>=100?'var(--grn)':'linear-gradient(90deg,var(--v2),var(--iris))',
          boxShadow:goals.dailyProgress>=100?'0 0 8px var(--grn)':'0 0 8px var(--glow)',transition:'width .6s ease'}}/>
      </div>
    </div>}
    {goals.weeklySessions>0&&<div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
        <span style={{color:'var(--dim)'}}>Weekly: {goals.weeklyActualSessions}/{goals.weeklySessions} sessions</span>
        <span style={{color:goals.weeklyProgress>=100?'var(--grn)':'var(--iris)',fontFamily:'var(--mono)',fontWeight:600}}>{goals.weeklyProgress}%</span>
      </div>
      <div style={{height:6,borderRadius:6,background:'rgba(255,255,255,.04)',overflow:'hidden'}}>
        <div style={{height:'100%',width:Math.min(100,goals.weeklyProgress)+'%',borderRadius:6,
          background:goals.weeklyProgress>=100?'var(--grn)':'linear-gradient(90deg,var(--v2),var(--iris))',
          boxShadow:goals.weeklyProgress>=100?'0 0 8px var(--grn)':'0 0 8px var(--glow)',transition:'width .6s ease'}}/>
      </div>
    </div>}
  </div>;
}

function MarqueeCard({marquee,doCmd}){
  const [text,setText]=useState('');
  const phrases=['Good girl','Keep watching','You have no choice','Submit','Let go','Relax'];
  const send=t=>{if(!t){toast('Enter text','err');return}doCmd('marquee',t)};
  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\u2726'}</span> Marquee</div>
    <div className={`mq-preview ${marquee?.trim()?'on':''}`}>{marquee?.trim()||'No marquee active'}</div>
    <div className="row" style={{marginBottom:8}}><input type="text" value={text} onChange={e=>setText(e.target.value)} placeholder="Type text\u2026" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&send(text)}/><button className="btn btn-p" onClick={()=>send(text)}>{'\u25b6'}</button><button className="btn btn-d" onClick={()=>doCmd('marqueeoff')}>{'\u2715'}</button><button className="btn btn-g" onClick={()=>doCmd('marqueetop')}>{'\u2191'}</button><button className="btn btn-g" onClick={()=>doCmd('marqueebottom')}>{'\u2193'}</button></div>
    <div className="group">{phrases.map(p=><button key={p} className="btn btn-g" style={{fontSize:10}} onClick={()=>{setText(p);send(p)}}>{p}</button>)}</div>
  </div>;
}


function QueueCard({items,doCmd}){
  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\u2630'}</span> Queue <span style={{color:'var(--mute)',fontWeight:400,fontSize:11,marginLeft:4}}>{items?.length?`(${items.length})`:'(empty)'}</span></div>
    <div style={{maxHeight:180,overflowY:'auto',listStyle:'none'}}>
      {(items||[]).slice(0,50).map((u,i)=>
        <SwipeItem key={i+u} onDismiss={()=>doCmd('removequeue',i)}>
          <div className="q-item"><span className="q-num">{i+1}</span><span className="q-url" title={u}>{trunc(u,50)}</span><span className="q-rm" onClick={()=>doCmd('removequeue',i)}>{'\u00d7'}</span></div>
        </SwipeItem>
      )}
      {!(items?.length)&&<div style={{color:'var(--dim)',fontSize:11,padding:6}}>Empty</div>}
    </div>
    <QueueInput doCmd={doCmd}/>
  </div>;
}

function QueueInput({doCmd}){
  const [url,setUrl]=useState('');
  const add=()=>{if(!url.trim()||!url.startsWith('http')){toast('Enter a valid URL','err');return}doCmd('appendurl',url.trim());setUrl('')};
  return <div className="row" style={{marginTop:8}}><input type="text" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://\u2026 add to queue" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&add()}/><button className="btn btn-g" onClick={add}>+ Queue</button></div>;
}

function PlaylistCard({playlist,plOp,loadPl}){
  const [bulk,setBulk]=useState(false);
  const [bulkText,setBulkText]=useState('');
  const [sel,setSel]=useState(new Set());
  const [addUrl,setAddUrl]=useState('');
  const [ctxMenu,setCtxMenu]=useState(null); // {index, x, y}

  const toggleSel=i=>{const n=new Set(sel);n.has(i)?n.delete(i):n.add(i);setSel(n)};
  const bulkDel=()=>{if(!sel.size)return;if(!confirm(`Delete ${sel.size} items?`))return;plOp('bulkremove',{indices:[...sel].sort((a,b)=>b-a)});setSel(new Set())};
  const bulkAdd=()=>{const lines=bulkText.split('\n').map(l=>l.trim()).filter(l=>l);if(!lines.length){toast('Paste URLs first','err');return}plOp('bulkappend',{entries:lines});setBulk(false);setBulkText('')};

  // Close context menu on outside tap
  useEffect(()=>{
    if(!ctxMenu)return;
    const close=()=>setCtxMenu(null);
    document.addEventListener('touchstart',close);document.addEventListener('click',close);
    return ()=>{document.removeEventListener('touchstart',close);document.removeEventListener('click',close)};
  },[ctxMenu]);

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\u2261'}</span> Playlist <span style={{color:'var(--mute)',fontWeight:400,fontSize:11,marginLeft:4}}>{playlist.length} items</span></div>
    <div className="row" style={{marginBottom:8}}>
      <button className="btn btn-g" onClick={loadPl}>{'\u21bb'} Reload</button>
      <button className="btn btn-d" onClick={()=>{if(confirm('Clear entire playlist?'))plOp('clear')}}>{'\u2715'} Clear</button>
      <button className="btn btn-b" onClick={()=>setBulk(!bulk)}>{'\ud83d\udccb'} Bulk</button>
      {sel.size>0&&<button className="btn btn-d" onClick={bulkDel}>Delete {sel.size}</button>}
    </div>
    {bulk&&<div style={{marginBottom:10}}>
      <textarea value={bulkText} onChange={e=>setBulkText(e.target.value)} rows={4} placeholder="Paste URLs, one per line\u2026"/>
      <div className="row" style={{marginTop:4}}><span style={{color:'var(--mute)',fontSize:10}}>{bulkText.split('\n').filter(l=>l.trim()).length} URLs</span><button className="btn btn-p" onClick={bulkAdd}>Add All</button><button className="btn btn-g" onClick={()=>{setBulk(false);setBulkText('')}}>Cancel</button></div>
    </div>}
    <div style={{maxHeight:320,overflowY:'auto'}}>
      <TouchSortable
        items={playlist}
        keyFn={(e,i)=>i+'-'+e.slice(0,20)}
        onReorder={(from,to)=>plOp('moveto',{from,to})}
        renderItem={(e,i,dragging)=>{
          const isDir=e.startsWith('#');
          return <PlaylistItem url={e} index={i} isDir={isDir} selected={sel.has(i)}
            onToggle={()=>toggleSel(i)} onLongPress={(ev)=>{
              const rect=ev?.target?.getBoundingClientRect?.();
              setCtxMenu({index:i,url:e,x:rect?rect.left:100,y:rect?rect.bottom:100});
            }}
            onMoveUp={()=>plOp('moveup',{index:i})} onMoveDown={()=>plOp('movedown',{index:i})}
            onRemove={()=>{if(confirm(`Remove #${i+1}?`))plOp('remove',{index:i})}}
            dragging={dragging}/>;
        }}/>
      {!playlist.length&&<div style={{color:'var(--dim)',fontSize:11,padding:6}}>Empty {'\u2014'} add URLs below.</div>}
    </div>
    {/* Context menu */}
    {ctxMenu&&<div style={{position:'fixed',zIndex:999,left:Math.min(ctxMenu.x,window.innerWidth-180),top:Math.min(ctxMenu.y,window.innerHeight-200),
      background:'var(--card)',border:'1px solid var(--bdr2)',borderRadius:'var(--r)',padding:4,minWidth:160,
      backdropFilter:'blur(16px)',boxShadow:'0 8px 30px rgba(0,0,0,.4)',animation:'rise .2s ease'}}
      onClick={e=>e.stopPropagation()}>
      <div style={{padding:'6px 12px',fontSize:11,color:'var(--mute)',fontFamily:'var(--mono)',borderBottom:'1px solid var(--bdr)',marginBottom:2}}>#{ctxMenu.index+1}</div>
      <button className="btn btn-g" style={{width:'100%',justifyContent:'flex-start',borderRadius:4,marginBottom:2}} onClick={()=>{plOp('moveto',{from:ctxMenu.index,to:0});setCtxMenu(null)}}>Move to top</button>
      <button className="btn btn-g" style={{width:'100%',justifyContent:'flex-start',borderRadius:4,marginBottom:2}} onClick={()=>{plOp('moveto',{from:ctxMenu.index,to:playlist.length-1});setCtxMenu(null)}}>Move to bottom</button>
      <button className="btn btn-g" style={{width:'100%',justifyContent:'flex-start',borderRadius:4,marginBottom:2}} onClick={()=>{try{navigator.clipboard?.writeText(ctxMenu.url)}catch(e){}toast('URL copied','ok');setCtxMenu(null)}}>Copy URL</button>
      <button className="btn btn-d" style={{width:'100%',justifyContent:'flex-start',borderRadius:4}} onClick={()=>{if(confirm(`Remove #${ctxMenu.index+1}?`))plOp('remove',{index:ctxMenu.index});setCtxMenu(null)}}>Delete</button>
    </div>}
    <div className="row" style={{marginTop:10}}><input type="text" value={addUrl} onChange={e=>setAddUrl(e.target.value)} placeholder="https://\u2026" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&(()=>{if(!addUrl.trim())return;plOp('append',{entry:addUrl.trim()});setAddUrl('')})()}/><button className="btn btn-s" onClick={()=>{if(!addUrl.trim())return;plOp('append',{entry:addUrl.trim()});setAddUrl('')}}>+ Append</button><button className="btn btn-b" onClick={()=>{if(!addUrl.trim())return;plOp('prepend',{entry:addUrl.trim()});setAddUrl('')}}>+ Prepend</button></div>
  </div>;
}

function PlaylistItem({url,index,isDir,selected,onToggle,onLongPress,onMoveUp,onMoveDown,onRemove,dragging}){
  const lp=useLongPress(onLongPress,400);
  return <div className="pl-item" style={{opacity:dragging?.5:1}} {...lp}>
    <input type="checkbox" checked={selected} onChange={onToggle} style={{accentColor:'var(--iris)'}}/>
    <span className="pl-num">{index+1}</span>
    <span className={`pl-url${isDir?' dir':''}`} title={url}>{trunc(url,50)}</span>
    <span className="pl-actions">
      <button className="btn btn-g" style={{padding:'1px 4px',fontSize:9}} onClick={onMoveUp}>{'\u2191'}</button>
      <button className="btn btn-g" style={{padding:'1px 4px',fontSize:9}} onClick={onMoveDown}>{'\u2193'}</button>
      <button className="btn btn-d" style={{padding:'1px 4px',fontSize:9}} onClick={onRemove}>{'\u2715'}</button>
    </span>
  </div>;
}

/* ─── Mount ─── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Register service worker for PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(r=>{
      console.log('SW registered:',r.scope);
    }).catch(e=>console.log('SW failed:',e));
  });
}
</script>
</body>
