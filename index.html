<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" id="meta-theme" content="#06060c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoidCapture">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>VoidCapture</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#06060c;--bg2:#0a0a14;--card:rgba(14,12,28,.72);--card2:rgba(20,16,38,.6);
--bdr:rgba(130,90,255,.1);--bdr2:rgba(130,90,255,.22);--bdrH:rgba(130,90,255,.35);
--txt:#ede8f6;--txt2:#c8c0e0;--dim:#7a7498;--mute:#4e4968;
--iris:#a07cff;--v1:#7c5cfc;--v2:#6346e0;--v3:#4e30c4;--glow:rgba(140,100,255,.3);--glowS:rgba(140,100,255,.12);
--red:#ff3d5a;--grn:#3de8a0;--amb:#ffb740;--sky:#40b0ff;
--mono:'JetBrains Mono',monospace;--sans:'Sora',sans-serif;
--r:10px;--r2:14px;--r3:20px;--blur:24px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--txt);overflow:hidden;-webkit-font-smoothing:antialiased}

/* Animated BG */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 50% at 20% 10%,rgba(100,70,220,.06),transparent),
  radial-gradient(ellipse 50% 60% at 80% 90%,rgba(60,40,180,.04),transparent),
  radial-gradient(circle at 50% 50%,rgba(80,50,200,.02),transparent 70%);
  pointer-events:none;z-index:0}

/* Glass */
.glass{background:var(--card);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--bdr);border-radius:var(--r2);transition:border-color .3s,box-shadow .3s}
.glass:hover{border-color:var(--bdr2);box-shadow:0 0 40px var(--glowS)}

/* Login */
#login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;position:relative;z-index:1}
.login-card{padding:44px 40px;max-width:400px;width:100%;box-shadow:0 0 80px rgba(100,60,255,.06),0 24px 48px rgba(0,0,0,.5);animation:rise .7s cubic-bezier(.16,1,.3,1)}
.login-card h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#fff 10%,var(--iris) 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;letter-spacing:-.8px}
.login-card .tag{text-align:center;font-size:11px;color:var(--mute);font-family:var(--mono);letter-spacing:.15em;text-transform:uppercase;margin:4px 0 32px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:10px;color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:.1em}
.field input{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;font-family:var(--mono);font-size:14px;color:var(--txt);outline:none;transition:all .3s}
.field input:focus{border-color:var(--iris);box-shadow:0 0 24px var(--glowS),inset 0 0 12px rgba(140,100,255,.04)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--v2),var(--iris));color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow)}
.btn-primary:active{transform:translateY(0)}.btn-primary:disabled{opacity:.45;cursor:default;transform:none}
.login-err{color:var(--red);font-size:12px;text-align:center;min-height:20px;margin-top:8px;opacity:0;transition:opacity .3s}.login-err.show{opacity:1}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .5s linear infinite}

/* App */
#app-wrap{display:none;height:100vh;flex-direction:column;position:relative;z-index:1}
#app-wrap.on{display:flex}

/* Top bar */
.topbar{display:flex;align-items:center;height:54px;padding:0 16px;background:var(--card);backdrop-filter:blur(var(--blur));border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:10}
.topbar .logo{font-size:15px;font-weight:700;background:linear-gradient(135deg,#fff,var(--iris));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px}
.pill{display:inline-flex;align-items:center;gap:5px;margin-left:10px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:.06em;transition:all .4s}
.pill.live{background:rgba(61,232,160,.08);color:var(--grn);box-shadow:0 0 14px rgba(61,232,160,.12)}
.pill.idle{background:rgba(255,255,255,.03);color:var(--mute)}
.pill .dot{width:6px;height:6px;border-radius:50%;transition:all .4s}
.pill.live .dot{background:var(--grn);box-shadow:0 0 8px var(--grn)}
.pill.idle .dot{background:var(--mute)}
.tz{font-size:9px;color:var(--mute);font-family:var(--mono);margin-left:auto;padding:0 10px}
.top-actions{display:flex;gap:5px;margin-left:auto}
.tbtn{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;color:var(--dim);padding:5px 11px;font-size:12px;cursor:pointer;transition:all .25s;font-family:var(--sans);font-weight:500}
.tbtn:hover{background:rgba(255,255,255,.08);color:var(--txt);border-color:var(--bdr2)}
.tbtn.danger{color:var(--red);border-color:rgba(255,61,90,.15)}.tbtn.danger:hover{background:rgba(255,61,90,.08);box-shadow:0 0 16px rgba(255,61,90,.1)}

/* Nav tabs */
.nav-bar{display:flex;border-bottom:1px solid var(--bdr);background:rgba(10,10,20,.5);backdrop-filter:blur(12px);padding:0 12px;flex-shrink:0}
.nav-item{padding:11px 18px;font-size:12px;font-weight:500;color:var(--mute);cursor:pointer;border-bottom:2px solid transparent;transition:all .25s;letter-spacing:.02em}
.nav-item:hover{color:var(--dim)}
.nav-item.active{color:var(--iris);border-color:var(--iris)}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--card);backdrop-filter:blur(var(--blur));border-top:1px solid var(--bdr);padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.mob-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px;font-size:9px;color:var(--mute);cursor:pointer;transition:all .2s;background:none;border:none;font-family:var(--sans)}
.mob-nav button.active{color:var(--iris)}
.mob-nav button .icon{font-size:17px}

/* Scrollable content */
.content{flex:1;overflow-y:auto;padding:16px 20px 90px;position:relative}
.content::-webkit-scrollbar{width:3px}.content::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
.tab-pane{display:none;opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease}
.tab-pane.active{display:block;opacity:1;transform:none;animation:tabIn .4s cubic-bezier(.16,1,.3,1)}
/* Cards */
.card{padding:18px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--iris);margin-bottom:12px;display:flex;align-items:center;gap:7px;letter-spacing:-.2px}
.card-title .ci{font-size:15px;opacity:.6}

/* Stat grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{text-align:center;padding:14px 8px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:25%;right:25%;height:1px;background:var(--accent,var(--iris));box-shadow:0 0 12px var(--accent,var(--iris));opacity:.4}
.stat-card .val{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:1px}
.stat-card .lbl{font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.12em}
.stat-card.purple{--accent:var(--iris)}.stat-card.green{--accent:var(--grn)}.stat-card.red{--accent:var(--red)}.stat-card.blue{--accent:var(--sky)}.stat-card.amber{--accent:var(--amb)}

/* Progress ring */
.ring-wrap{display:flex;align-items:center;justify-content:center;padding:16px 0}
.ring-container{position:relative;width:160px;height:160px}
.ring-container svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:6}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-time{font-family:var(--mono);font-size:24px;font-weight:700}
.ring-label{font-size:10px;color:var(--dim);margin-top:2px}
.ring-url{font-size:9px;color:var(--mute);font-family:var(--mono);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:6px}
.ring-pulse{position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--iris);opacity:0;animation:ringPulse 2.5s infinite}
@keyframes ringPulse{0%{opacity:.3;transform:scale(.98)}50%{opacity:0;transform:scale(1.04)}100%{opacity:0;transform:scale(1.04)}}

/* Sliders */
.slider-row{display:grid;grid-template-columns:50px 1fr 46px;align-items:center;gap:8px;margin-bottom:8px}
.slider-row .label{font-size:11px;color:var(--dim);font-weight:500}
.slider-row .val{font-size:12px;color:var(--iris);font-family:var(--mono);text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;background:rgba(255,255,255,.05);border-radius:5px;outline:none;cursor:pointer;transition:background .2s}
input[type=range]:hover{background:rgba(255,255,255,.08)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--iris);box-shadow:0 0 14px var(--glow);cursor:pointer;transition:all .2s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 24px var(--glow);transform:scale(1.1)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--iris);box-shadow:0 0 14px var(--glow);border:none;cursor:pointer}

/* Remote buttons */
.remote{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.remote .rbtn{padding:16px 8px;border:1px solid var(--bdr);border-radius:var(--r2);background:var(--card2);color:var(--txt2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.remote .rbtn:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.remote .rbtn:active{transform:translateY(0)}
.remote .rbtn .ri{font-size:22px}
.remote .rbtn.accent{background:linear-gradient(135deg,rgba(255,61,90,.1),rgba(255,61,90,.05));border-color:rgba(255,61,90,.2);color:var(--red)}
.remote .rbtn.accent:hover{box-shadow:0 0 24px rgba(255,61,90,.12)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:12px;color:var(--dim)}
.switch{position:relative;width:42px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch span{position:absolute;inset:0;background:rgba(255,255,255,.06);border-radius:22px;cursor:pointer;transition:all .3s;border:1px solid var(--bdr)}
.switch span::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;background:#444;border-radius:50%;transition:all .3s}
.switch input:checked+span{background:rgba(160,124,255,.15);border-color:var(--iris);box-shadow:0 0 12px var(--glowS)}
.switch input:checked+span::after{transform:translateX(20px);background:var(--iris);box-shadow:0 0 8px var(--iris)}

/* Buttons */
.btn{border:none;border-radius:8px;padding:7px 14px;font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn-g{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--bdr)}.btn-g:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.btn-p{background:linear-gradient(135deg,var(--v2),var(--iris));color:#fff}.btn-p:hover{box-shadow:0 4px 20px var(--glow)}
.btn-d{background:rgba(255,61,90,.06);color:var(--red);border:1px solid rgba(255,61,90,.12)}.btn-d:hover{background:rgba(255,61,90,.12)}
.btn-s{background:rgba(61,232,160,.06);color:var(--grn);border:1px solid rgba(61,232,160,.12)}.btn-s:hover{background:rgba(61,232,160,.12)}
.btn-b{background:rgba(64,176,255,.06);color:var(--sky);border:1px solid rgba(64,176,255,.12)}.btn-b:hover{background:rgba(64,176,255,.12)}

/* Inputs */
input[type=text],input[type=number],input[type=password],textarea,select{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;font-family:var(--mono);font-size:12px;color:var(--txt);outline:none;transition:all .25s}
input:focus,textarea:focus,select:focus{border-color:var(--iris);box-shadow:0 0 18px var(--glowS)}
textarea{width:100%;resize:vertical;min-height:60px}

/* Number row */
.num-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.num-row input[type=number]{width:65px;text-align:center}
.num-row .info{flex:1;min-width:100px;font-size:11px;color:var(--dim)}.num-row .info strong{display:block;color:var(--txt2);font-size:12px;margin-bottom:1px}

/* Marquee preview */
.mq-preview{background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;font-family:var(--mono);font-size:12px;color:var(--mute);min-height:38px;word-break:break-all;transition:all .3s;margin-bottom:10px}
.mq-preview.on{color:var(--txt);border-color:var(--bdr2);box-shadow:0 0 16px var(--glowS)}

/* Weekly grid */
/* Schedule entry cards */
.sched-entry{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;border-radius:var(--r2);background:var(--card2);border:1px solid var(--bdr);transition:all .3s}
.sched-entry:hover{border-color:var(--bdr2);box-shadow:0 0 20px var(--glowS)}
.sched-entry .se-time{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--iris);min-width:70px;text-shadow:0 0 20px var(--glowS)}
.sched-entry .se-days{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.sched-entry .se-day{font-size:10px;font-weight:600;padding:3px 8px;border-radius:12px;background:rgba(160,124,255,.12);color:var(--iris);letter-spacing:.04em;text-transform:uppercase;border:1px solid rgba(160,124,255,.2)}
.sched-entry .se-urls{font-size:9px;color:var(--dim);font-family:var(--mono)}
.sched-entry .se-actions{display:flex;gap:4px;flex-shrink:0}
.sched-add-btn{width:100%;padding:14px;border:1px dashed var(--bdr2);border-radius:var(--r2);background:transparent;color:var(--dim);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:6px}
.sched-add-btn:hover{border-color:var(--iris);color:var(--iris);background:rgba(160,124,255,.04)}

/* Schedule editor (inline) */
.sched-editor{padding:16px;margin:8px 0;border-radius:var(--r2);background:rgba(160,124,255,.04);border:1px solid var(--bdr2)}
.day-pills{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.day-pill{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--mute);letter-spacing:.04em;user-select:none}
.day-pill:hover{border-color:var(--bdr2);color:var(--dim)}
.day-pill.on{background:rgba(160,124,255,.2);border-color:var(--iris);color:var(--iris);box-shadow:0 0 12px var(--glowS)}

/* Time picker (select dropdowns) */
.time-picker{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0;padding:16px;background:rgba(255,255,255,.02);border-radius:var(--r2);border:1px solid var(--bdr)}
.tp-select{background:var(--card2);border:1px solid var(--bdr2);border-radius:var(--r);color:var(--txt);font-family:var(--mono);font-size:22px;font-weight:700;padding:10px 14px;cursor:pointer;outline:none;text-align:center;min-width:70px;appearance:none;-webkit-appearance:none;transition:all .25s}
.tp-select:hover{border-color:var(--iris);box-shadow:0 0 16px var(--glowS)}
.tp-select:focus{border-color:var(--iris);box-shadow:0 0 20px var(--glowS)}
.tp-sep{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--iris);padding:0 2px}
.tp-ampm{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--dim);padding:4px 10px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid var(--bdr);min-width:36px;text-align:center}

/* Chart container */
.chart-wrap{position:relative;height:140px;margin:4px 0}
.chart-wrap canvas{width:100%!important}

/* Heatmap */
.heatmap{display:grid;grid-template-columns:30px repeat(24,1fr);gap:1px;margin:8px 0}
.hm-label{font-size:8px;color:var(--mute);font-family:var(--mono);display:flex;align-items:center}
.hm-cell{aspect-ratio:1.2;border-radius:2px;min-height:10px;transition:all .2s}
.hm-hour{font-size:7px;color:var(--mute);font-family:var(--mono);text-align:center}

/* Playlist items */
.pl-item{display:flex;align-items:center;gap:5px;padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.02);font-size:11px;transition:background .2s}
.pl-item:hover{background:rgba(255,255,255,.02)}
.pl-num{color:var(--mute);font-family:var(--mono);font-size:9px;min-width:20px;text-align:right}
.pl-url{color:var(--dim);font-family:var(--mono);font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-url.dir{color:var(--iris)}
.pl-actions{display:flex;gap:2px;flex-shrink:0}

/* Queue */
.q-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.02);font-size:11px;list-style:none}
.q-num{color:var(--mute);font-family:var(--mono);font-size:9px;min-width:16px}
.q-url{color:var(--dim);font-family:var(--mono);font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-rm{color:var(--red);cursor:pointer;font-size:13px;padding:2px}

/* History */
.hist-item{display:flex;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.015);font-size:10px}
.hist-time{color:var(--mute);font-family:var(--mono);font-size:9px;flex-shrink:0}
.hist-url{color:var(--dim);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Top videos */
.tv-item{display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.tv-rank{color:var(--mute);font-family:var(--mono);font-size:9px;width:18px;text-align:right;flex-shrink:0}
.tv-url{font-family:var(--mono);font-size:10px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tv-stats{font-family:var(--mono);font-size:9px;color:var(--iris);flex-shrink:0}

/* Floating panic */
.fab-panic{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#ff1a3a,#cc0022);border:2px solid rgba(255,61,90,.3);color:#fff;font-size:22px;cursor:pointer;z-index:999;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(255,61,90,.25),0 0 40px rgba(255,61,90,.08);transition:all .3s}
.fab-panic:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(255,61,90,.35),0 0 60px rgba(255,61,90,.12)}
.fab-panic:active{transform:scale(.95)}

/* Section titles */
.sec-title{font-size:10px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.12em;margin:12px 0 6px}

/* Toast */
.toasts{position:fixed;top:60px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:9px 16px;border-radius:var(--r);font-size:11px;font-weight:500;backdrop-filter:blur(12px);animation:rise .3s ease;transition:opacity .3s;pointer-events:auto;border:1px solid}
.toast-ok{background:rgba(61,232,160,.08);color:var(--grn);border-color:rgba(61,232,160,.15)}
.toast-err{background:rgba(255,61,90,.08);color:var(--red);border-color:rgba(255,61,90,.15)}
.toast-inf{background:rgba(160,124,255,.08);color:var(--iris);border-color:rgba(160,124,255,.15)}

/* Info row */
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02);font-size:11px}
.info-row .k{color:var(--mute)}.info-row .v{color:var(--iris);font-family:var(--mono)}

/* Row + group helpers */
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.group{display:flex;gap:6px;flex-wrap:wrap}

/* Animations */
@keyframes rise{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
@keyframes sp{to{transform:rotate(360deg)}}

/* Guide */
.guide-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);overflow-y:auto;padding:20px;display:none}
.guide-overlay.open{display:block}
.guide-inner{max-width:600px;margin:20px auto;padding:28px;animation:rise .3s}
.guide-inner h2{font-size:20px;font-weight:700;background:linear-gradient(135deg,#fff 30%,var(--iris));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.guide-inner .gs{color:var(--txt);font-weight:600;font-size:13px;margin:16px 0 6px;border-bottom:1px solid var(--bdr);padding-bottom:4px}
.guide-inner p{font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:6px}

/* Responsive */
@media(max-width:768px){
  .nav-bar{display:none!important}
  .mob-nav{display:flex!important}
  .content{padding:14px 12px 88px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .remote{grid-template-columns:1fr 1fr 1fr}
  .tz{display:none}
  .ring-container{width:140px;height:140px}
  .ring-time{font-size:20px}
  .fab-panic{bottom:80px;right:16px;width:50px;height:50px;font-size:20px}
  .chart-wrap{height:110px}
}
@media(max-width:400px){.stats-grid{grid-template-columns:1fr 1fr}.stat-card .val{font-size:16px}}
/* ═══ LIGHT THEME ═══ */
[data-theme="light"]{
--bg:#f4f2f8;--bg2:#ebe8f2;--card:rgba(255,255,255,.85);--card2:rgba(248,245,255,.7);
--bdr:rgba(100,70,200,.1);--bdr2:rgba(100,70,200,.18);--bdrH:rgba(100,70,200,.3);
--txt:#1a1a2e;--txt2:#2a2840;--dim:#5a5474;--mute:#8884a0;
--iris:#7c5cfc;--v1:#6346e0;--v2:#5030c0;--v3:#4020a0;--glow:rgba(100,70,220,.2);--glowS:rgba(100,70,220,.08);
--red:#e03050;--grn:#20b070;--amb:#d09020;--sky:#3090e0;
}
[data-theme="light"] body{background:var(--bg)}
[data-theme="light"] body::before{background:radial-gradient(ellipse at 30% 20%,rgba(100,70,220,.04),transparent),radial-gradient(ellipse at 70% 80%,rgba(60,40,180,.03),transparent)}
[data-theme="light"] .glass{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
[data-theme="light"] input[type=range]{background:rgba(0,0,0,.06)}
[data-theme="light"] .stat-card::before{opacity:.25}
[data-theme="light"] .login-card{box-shadow:0 8px 40px rgba(100,70,200,.1),0 1px 3px rgba(0,0,0,.05)}
[data-theme="light"] .fab-panic{box-shadow:0 4px 20px rgba(224,48,80,.2)}

/* Theme toggle button */
.theme-btn{background:none;border:1px solid var(--bdr);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .3s;color:var(--dim)}
.theme-btn:hover{border-color:var(--bdr2);background:rgba(255,255,255,.05);color:var(--txt)}

/* ═══ TAB ANIMATIONS ═══ */
@keyframes tabIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}

/* ═══ SKELETON LOADING ═══ */
.skeleton{border-radius:var(--r);overflow:hidden;position:relative;background:rgba(255,255,255,.04)}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.skel-text{height:12px;margin:6px 0;border-radius:4px}
.skel-stat{height:48px;border-radius:var(--r)}
.skel-chart{height:120px;border-radius:var(--r)}
.skel-row{height:28px;margin:4px 0;border-radius:6px}

/* ═══ GESTURE SUPPORT ═══ */
.gesture-area{touch-action:pan-x pan-y;-webkit-user-select:none;user-select:none}
.swipe-item{transition:transform .25s ease,opacity .25s ease}
.swipe-item.swiping{transition:none}
.swipe-item.dismissed{transform:translateX(-100%);opacity:0;height:0;padding:0;margin:0;overflow:hidden;transition:all .3s ease}

/* Pull to refresh */
.ptr-indicator{text-align:center;height:0;overflow:hidden;transition:height .3s ease;color:var(--iris);font-size:11px;font-family:var(--mono);display:flex;align-items:center;justify-content:center}
.ptr-indicator.pulling{height:36px}
.ptr-indicator .ptr-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--iris);border-radius:50%;animation:sp .6s linear infinite;margin-right:6px}

/* ═══ AMBIENT BACKGROUND ═══ */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 2s ease}
.ambient-idle{opacity:0}
.ambient-playing{opacity:1;background:radial-gradient(ellipse at 50% 80%,rgba(100,60,220,.04),transparent 60%),radial-gradient(ellipse at 20% 20%,rgba(60,40,180,.03),transparent 50%)}
[data-theme="light"] .ambient-playing{background:radial-gradient(ellipse at 50% 80%,rgba(100,60,220,.03),transparent 60%)}

/* ═══ INSTALL PROMPT ═══ */
.install-banner{position:fixed;bottom:90px;left:16px;right:16px;z-index:90;padding:12px 16px;border-radius:var(--r2);background:var(--card);backdrop-filter:blur(var(--blur));border:1px solid var(--bdr2);display:flex;align-items:center;gap:10px;animation:rise .4s ease;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.install-banner .ib-text{flex:1;font-size:12px;color:var(--dim)}
.install-banner .ib-text strong{color:var(--txt);display:block;margin-bottom:2px}

/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-text{height:14px;margin-bottom:8px;border-radius:4px}
.skel-card{height:80px;margin-bottom:12px}
.skel-stat{height:60px}
.skel-ring{width:160px;height:160px;border-radius:50%;margin:16px auto}

/* Slide transitions */
.tab-slide-enter{animation:slideIn .35s cubic-bezier(.16,1,.3,1)}
.tab-slide-exit{animation:slideOut .2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
@keyframes slideOut{from{opacity:1}to{transform:translateX(-20px);opacity:0}}

/* Swipeable items */
.swipeable{position:relative;overflow:hidden;touch-action:pan-y}
.swipe-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:linear-gradient(90deg,transparent,rgba(255,61,90,.2));display:flex;align-items:center;justify-content:flex-end;padding-right:12px;color:var(--red);font-size:18px;opacity:0;transition:opacity .2s}
.swipeable.swiping .swipe-bg{opacity:1}

/* Pull to refresh */
.ptr-indicator{text-align:center;padding:0;overflow:hidden;height:0;transition:height .2s;color:var(--iris);font-size:11px;font-family:var(--mono)}
.ptr-indicator.active{height:32px;padding:8px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─── API Layer ─── */
let S={u:null,t:null};
const api=async(m,p,b)=>{
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(S.t)o.headers['Authorization']='Bearer '+S.t;
  if(b!==undefined)o.body=JSON.stringify(b);
  const r=await fetch(S.u+p,o);
  if(!r.ok){const e=await r.json().catch(()=>({error:'HTTP '+r.status}));throw new Error(e.error||e.message||'HTTP '+r.status)}
  return r.json();
};
const cmd=async(n,v)=>{
  const b={cmd:n};if(v!==undefined)b.value=v;
  const r=await api('POST','/command',b);
  if(!r.success)throw new Error(r.message||'failed');
  return r;
};

/* ─── Utils ─── */
const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
const fmtSec=s=>{s=Math.max(0,Math.floor(s));const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec};
const fmtLocal=iso=>{try{return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:tz})}catch(e){return iso}};
const trunc=(s,n)=>s&&s.length>n?s.slice(0,n)+'\u2026':s;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ─── Toast System ─── */
let toastId=0;
function ToastContainer(){
  const [toasts,setToasts]=useState([]);
  window._addToast=(msg,type='ok')=>{
    const id=++toastId;
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  };
  return <div className="toasts">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}</div>;
}
const toast=(m,t)=>window._addToast?.(m,t);

/* ─── Login Screen ─── */
function LoginScreen({onLogin}){
  const [url,setUrl]=useState('');
  const [code,setCode]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const codeRef=useRef(),pinRef=useRef();

  useEffect(()=>{
    try{const h=window.location.hash.slice(1);if(!h)return;const p={};h.split('&').forEach(x=>{const[k,v]=x.split('=');if(k&&v)p[decodeURIComponent(k)]=decodeURIComponent(v)});
    if(p.T)setUrl(p.T);if(p.C)setCode(p.C.toUpperCase());history.replaceState(null,'',window.location.pathname)}catch(e){}
  },[]);

  const submit=async()=>{
    setErr('');
    if(!url.startsWith('https://')){setErr('URL must start with https://');return}
    if(code.length!==6){setErr('Code must be 6 characters');return}
    if(!/^\d{6}$/.test(pin)){setErr('PIN must be 6 digits');return}
    setBusy(true);S.u=url.replace(/\/+$/,'');
    try{
      const res=await api('POST','/auth',{code,pin});
      if(!res.ok){setErr(res.error||'Auth failed');setBusy(false);return}
      S.t=res.token;onLogin();
    }catch(e){
      S.u=S.t=null;const m=e.message||'';
      if(m.includes('Failed to fetch')||m.includes('NetworkError'))setErr('Cannot reach tunnel URL.');
      else if(m.includes('401'))setErr('Incorrect code or PIN.');
      else setErr('Failed: '+m);setBusy(false);
    }
  };

  return <div id="login-wrap">
    <div className="login-card glass">
      <h1>VoidCapture</h1>
      <div className="tag">Remote Controller</div>
      <div className="field"><label>Tunnel URL</label><input type="text" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.trycloudflare.com" onKeyDown={e=>e.key==='Enter'&&codeRef.current?.focus()} autoComplete="off" spellCheck="false"/></div>
      <div className="field"><label>Session Code</label><input ref={codeRef} type="text" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="ABC123" maxLength={6} style={{textTransform:'uppercase',letterSpacing:'.2em'}} onKeyDown={e=>e.key==='Enter'&&pinRef.current?.focus()} autoComplete="off"/></div>
      <div className="field"><label>PIN</label><input ref={pinRef} type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder={'\u2022\u2022\u2022\u2022\u2022\u2022'} maxLength={6} inputMode="numeric" onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="off"/></div>
      <button className="btn-primary" onClick={submit} disabled={busy}>{busy?<><span className="spin"/> Connecting{'\u2026'}</>:'Connect'}</button>
      <div className={`login-err ${err?'show':''}`}>{err}</div>
    </div>
  </div>;
}

/* ─── Progress Ring ─── */
function ProgressRing({progress=0,time='0:00',total='--:--',url,playing,onVolumeChange,onSpeedChange}){
  const ringRef=useRef();
  useSwipeGesture(ringRef,{
    onSwipeUp:()=>{onVolumeChange?.(10);try{navigator.vibrate?.(15)}catch(e){}},
    onSwipeDown:()=>{onVolumeChange?.(-10);try{navigator.vibrate?.(15)}catch(e){}},
    onSwipeRight:()=>{onSpeedChange?.(0.1);try{navigator.vibrate?.(15)}catch(e){}},
    onSwipeLeft:()=>{onSpeedChange?.(-0.1);try{navigator.vibrate?.(15)}catch(e){}},
    threshold:30
  });
  const r=68,c=2*Math.PI*r;
  const offset=c-(progress*c);
  return <div className="ring-wrap">
    <div className="ring-container" ref={ringRef}>
      {playing&&<div className="ring-pulse"/>}
      <svg viewBox="0 0 160 160">
        <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="var(--v2)"/><stop offset="100%" stopColor="var(--iris)"/></linearGradient></defs>
        <circle className="ring-bg" cx="80" cy="80" r={r}/>
        <circle className="ring-fill" cx="80" cy="80" r={r} strokeDasharray={c} strokeDashoffset={offset}/>
      </svg>
      <div className="ring-center">
        <div className="ring-time">{time}</div>
        <div className="ring-label">{playing?'of '+total:'Idle'}</div>
        {url&&<div className="ring-url" title={url}>{trunc(url,20)}</div>}
      </div>
    </div>
  </div>;
}

/* ─── Trend Chart ─── */
function TrendChart({data}){
  const canvasRef=useRef();
  const chartRef=useRef();
  useEffect(()=>{
    if(!canvasRef.current||!data?.length)return;
    if(chartRef.current)chartRef.current.destroy();
    const ctx=canvasRef.current.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,140);
    grad.addColorStop(0,'rgba(160,124,255,.3)');grad.addColorStop(1,'rgba(160,124,255,.01)');
    chartRef.current=new Chart(ctx,{type:'line',data:{
      labels:data.map(d=>d.date?.slice(5)||''),
      datasets:[{data:data.map(d=>Math.round((d.totalSec||0)/60)),fill:true,backgroundColor:grad,
        borderColor:'rgba(160,124,255,.8)',borderWidth:2,tension:.4,pointRadius:0,pointHitRadius:8,
        pointHoverRadius:4,pointHoverBackgroundColor:'#a07cff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>c.raw+' min'},backgroundColor:'rgba(14,12,28,.9)',titleColor:'#a07cff',bodyColor:'#ede8f6',borderColor:'rgba(130,90,255,.3)',borderWidth:1}},
        scales:{x:{ticks:{color:'#4e4968',font:{size:8,family:'JetBrains Mono'},maxRotation:0,maxTicksLimit:8},grid:{display:false},border:{display:false}},
          y:{ticks:{color:'#4e4968',font:{size:8,family:'JetBrains Mono'},callback:v=>v+'m'},grid:{color:'rgba(255,255,255,.02)'},border:{display:false},beginAtZero:true}},
        interaction:{intersect:false,mode:'index'}}});
    return ()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data]);
  return <div className="chart-wrap"><canvas ref={canvasRef}/></div>;
}

/* ─── Heatmap ─── */
function SessionHeatmap({data}){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const max=Math.max(1,...Object.values(data||{}));
  return <div className="heatmap">
    <div/>{Array.from({length:24},(_, i)=><div key={i} className="hm-hour">{i%3===0?i:''}</div>)}
    {days.map((d,di)=><React.Fragment key={d}>
      <div className="hm-label">{d}</div>
      {Array.from({length:24},(_,h)=>{
        const v=data?.[`${di}-${h}`]||0;const pct=v/max;
        const bg=pct>0?`rgba(160,124,255,${.08+pct*.5})`:'rgba(255,255,255,.015)';
        const shadow=pct>.5?`0 0 6px rgba(140,100,255,${pct*.3})`:'none';
        return <div key={h} className="hm-cell" style={{background:bg,boxShadow:shadow}} title={`${d} ${h}:00 \u2014 ${Math.round(v/60)}min`}/>;
      })}
    </React.Fragment>)}
  </div>;
}

/* ─── Time Picker (select dropdowns) ─── */
function TimePicker({hour,min,onHourChange,onMinChange}){
  const hours=Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
  const mins=Array.from({length:12},(_,i)=>String(i*5).padStart(2,'0'));
  return <div className="time-picker">
    <select className="tp-select" value={hour} onChange={e=>onHourChange(e.target.value)}>
      {hours.map(h=><option key={h} value={h}>{h}</option>)}
    </select>
    <span className="tp-sep">:</span>
    <select className="tp-select" value={min} onChange={e=>onMinChange(e.target.value)}>
      {mins.map(m=><option key={m} value={m}>{m}</option>)}
    </select>
    <span className="tp-ampm">{parseInt(hour)>=12?'PM':'AM'}</span>
  </div>;
}

function ScheduleEditor({initial,onSave,onCancel}){
  const dayList=[{k:'mon',l:'Mon'},{k:'tue',l:'Tue'},{k:'wed',l:'Wed'},{k:'thu',l:'Thu'},{k:'fri',l:'Fri'},{k:'sat',l:'Sat'},{k:'sun',l:'Sun'}];
  const [name,setName]=useState(()=>initial?.name||'');
  const [days,setDays]=useState(()=>initial?initial.days:['mon']);
  const [hour,setHour]=useState(()=>initial?initial.hour:'22');
  const [min,setMin]=useState(()=>initial?initial.min:'00');
  const [urls,setUrls]=useState(()=>initial?.urls?.join('\n')||'');
  const [showUrls,setShowUrls]=useState(()=>!!(initial?.urls?.length));

  const toggleDay=d=>{
    setDays(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d]);
  };
  const save=()=>{
    if(!days.length){toast('Select at least one day','err');return}
    const urlList=urls.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
    onSave({name:name.trim(),days,hour,min,urls:urlList.length?urlList:undefined});
  };
  const presets=[
    {label:'Weeknights',days:['mon','tue','wed','thu','fri']},
    {label:'Weekends',days:['sat','sun']},
    {label:'Every day',days:['mon','tue','wed','thu','fri','sat','sun']},
  ];

  return <div className="sched-editor">
    <div style={{fontSize:11,color:'var(--dim)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>
      {initial?'Edit Entry':'New Schedule Entry'}
    </div>
    <div className="field" style={{marginBottom:10}}>
      <label style={{fontSize:10,color:'var(--dim)'}}>Name (optional)</label>
      <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Nightly session, Weekend deep..." style={{fontSize:13}}/>
    </div>
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
      {presets.map(p=><button key={p.label} className="btn btn-g" style={{fontSize:9,padding:'4px 10px'}}
        onClick={()=>setDays(p.days)}>{p.label}</button>)}
    </div>
    <div className="day-pills">
      {dayList.map(d=><div key={d.k} className={`day-pill${days.includes(d.k)?' on':''}`}
        onClick={()=>toggleDay(d.k)}>{d.l}</div>)}
    </div>
    <TimePicker hour={hour} min={min} onHourChange={setHour} onMinChange={setMin}/>
    <div style={{textAlign:'center',fontFamily:'var(--mono)',fontSize:13,color:'var(--iris)',margin:'8px 0'}}>
      {name&&<span style={{color:'var(--txt)',fontWeight:600}}>{name} — </span>}
      {days.map(d=>d.charAt(0).toUpperCase()+d.slice(1)).join(', ')} at {hour}:{min}
    </div>
    <div style={{margin:'10px 0'}}>
      <button className="btn btn-g" style={{fontSize:10,marginBottom:6}} onClick={()=>setShowUrls(!showUrls)}>
        {showUrls?'\u25bc Hide playlist':'\u25b6 Assign custom playlist'} {urls.split('\n').filter(l=>l.trim()).length>0?`(${urls.split('\n').filter(l=>l.trim()).length} URLs)`:''}
      </button>
      {showUrls&&<div>
        <textarea value={urls} onChange={e=>setUrls(e.target.value)} rows={4} placeholder="Paste URLs, one per line...&#10;Leave empty to use the default playlist" style={{fontSize:11}}/>
        <div style={{fontSize:9,color:'var(--mute)',marginTop:2}}>Leave empty to use the default playlist</div>
      </div>}
    </div>
    <div className="row" style={{justifyContent:'center'}}>
      <button className="btn btn-p" onClick={save}>{initial?'Update':'Add Schedule'}</button>
      <button className="btn btn-g" onClick={onCancel}>Cancel</button>
    </div>
  </div>;
}

function ScheduleEntryCard({entry,onDelete,onEdit}){
  const t=entry.time.split(':');
  const h=parseInt(t[0]),m=t[1];
  const ampm=h>=12?'PM':'AM';
  const h12=h===0?12:h>12?h-12:h;
  const timeStr=`${h12}:${m} ${ampm}`;
  const hasUrls=entry.urls&&entry.urls.length>0;
  return <div className="sched-entry">
    <div className="se-time">{timeStr}</div>
    <div style={{flex:1}}>

function ScheduleCard({weekSched,setWeekSched,doCmd,schedDirtyRef}){
  const [editing,setEditing]=useState(false);
  const [adding,setAdding]=useState(false);

  // Mark dirty when entering edit mode, clean when leaving
  useEffect(()=>{
    schedDirtyRef.current=adding||!!editing;
  },[adding,editing,schedDirtyRef]);

  // Auto-save helper: update state + immediately push to server
  const autoSave=(next)=>{
    setWeekSched(next);
    // Push to server immediately — no separate save button needed
    doCmd('weeklyschedule',JSON.stringify(next),true);
    schedDirtyRef.current=false;
  };

  // Group raw schedule entries by time+name for display
  const grouped=useMemo(()=>{
    const map=new Map();
    (weekSched||[]).forEach((e,i)=>{
      const key=e.time+'|'+(e.name||'');
      if(!map.has(key))map.set(key,{time:e.time,name:e.name||'',days:[],urls:e.urls,indices:[]});
      const g=map.get(key);
      if(!g.days.includes(e.day))g.days.push(e.day);
      g.indices.push(i);
      if(e.urls&&e.urls.length)g.urls=e.urls;
    });
    return [...map.values()].sort((a,b)=>a.time.localeCompare(b.time));
  },[weekSched]);

  const saveEntry=({name,days,hour,min,urls})=>{
    const time=hour+':'+min;
    let next=[...(weekSched||[])];
    if(editing&&editing.entry){
      const old=editing.entry;
      next=next.filter(e=>!(e.time===old.time&&old.days.includes(e.day)&&(e.name||'')===(old.name||'')));
    }
    days.forEach(d=>{
      if(!next.find(e=>e.day===d&&e.time===time&&(e.name||'')===(name||''))){
        const entry={day:d,time};
        if(name)entry.name=name;
        if(urls&&urls.length)entry.urls=urls;
        next.push(entry);
      }
    });
    autoSave(next);
    setAdding(false);setEditing(false);
    toast('Schedule saved','ok');
  };

  const deleteGroup=(group)=>{
    if(!confirm(`Delete "${group.name||group.time}" schedule?`))return;
    const next=(weekSched||[]).filter(e=>!(e.time===group.time&&group.days.includes(e.day)&&(e.name||'')===(group.name||'')));
    autoSave(next);
    toast('Schedule removed','ok');
  };

  const editGroup=(group)=>{
    setEditing({entry:group});
    setAdding(false);
  };

  return <div className="card glass">
    <div className="card-title"><span className="ci">{'\u23f1'}</span> Schedule</div>

    <div className="row" style={{marginBottom:14}}>
      <button className="btn btn-s" onClick={()=>doCmd('autostartnow')}>{'\u25b6'} Start Now</button>
      <button className="btn btn-g" onClick={()=>doCmd('cancelschedule')}>{'\u2715'} Cancel</button>
    </div>

    <NumRow label="Idle Auto-Start" unit="min" defVal={0} onSet={v=>doCmd('idlestart',v)} info="0 = off"/>
    <NumRow label="Delay Start" unit="min" defVal={0} onSet={v=>doCmd('delay',v)} info="N minutes"/>

    <div className="sec-title" style={{marginTop:16}}>Weekly Schedule</div>

    {grouped.map((g,i)=>
      <ScheduleEntryCard key={g.time+g.days.join()+(g.name||'')} entry={g}
        onDelete={()=>deleteGroup(g)}
        onEdit={()=>editGroup(g)}/>
    )}

    {!grouped.length&&!adding&&!editing&&
      <div style={{color:'var(--mute)',fontSize:12,padding:'12px 0',textAlign:'center'}}>No recurring schedules set</div>}

    {(adding||editing)&&
      <ScheduleEditor
        initial={editing?{name:editing.entry.name,days:editing.entry.days,hour:editing.entry.time.split(':')[0],min:editing.entry.time.split(':')[1],urls:editing.entry.urls}:null}
        onSave={saveEntry}
        onCancel={()=>{setAdding(false);setEditing(false)}}/>
    }

    {!adding&&!editing&&
      <button className="sched-add-btn" onClick={()=>setAdding(true)}>+ Add Schedule Entry</button>}
  </div>;
}

function SkeletonCard(){return <div className="skeleton skel-card"/>}
function SkeletonStat(){return <div className="skeleton skel-stat"/>}
function SkeletonRing(){return <div className="skeleton skel-ring"/>}
function SkeletonText({width}){return <div className="skeleton skel-text" style={{width:width||'100%'}}/>}

/* ─── Touch Gesture Hook ─── */
function useSwipeGesture(ref, {onSwipeLeft,onSwipeRight,onSwipeUp,onSwipeDown,threshold=50}={}){
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    let startX=0,startY=0,tracking=false;
    const onStart=e=>{const t=e.touches[0];startX=t.clientX;startY=t.clientY;tracking=true};
    const onEnd=e=>{
      if(!tracking)return;tracking=false;
      const t=e.changedTouches[0];
      const dx=t.clientX-startX,dy=t.clientY-startY;
      const absDx=Math.abs(dx),absDy=Math.abs(dy);
      if(absDx<threshold&&absDy<threshold)return;
      if(absDx>absDy){dx>0?onSwipeRight?.():onSwipeLeft?.()}
      else{dy>0?onSwipeDown?.():onSwipeUp?.()}
    };
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchend',onEnd,{passive:true});
    return ()=>{el.removeEventListener('touchstart',onStart);el.removeEventListener('touchend',onEnd)};
  },[ref,onSwipeLeft,onSwipeRight,onSwipeUp,onSwipeDown,threshold]);
}

/* ─── Haptic Feedback ─── */
const haptic=(ms=12)=>{try{navigator.vibrate?.(ms)}catch(e){}};

/* ─── Long Press Hook ─── */
function useLongPress(callback,delay=500){
  const timerRef=useRef();
  const activeRef=useRef(false);
  const cbRef=useRef(callback);
  cbRef.current=callback;
  const start=useCallback(e=>{
    activeRef.current=false;
    timerRef.current=setTimeout(()=>{activeRef.current=true;haptic(20);cbRef.current?.(e)},delay);
  },[delay]);
  const cancel=useCallback(()=>{clearTimeout(timerRef.current)},[]);
  const click=useCallback(e=>{if(activeRef.current){e.preventDefault();e.stopPropagation();activeRef.current=false}},[]);
  return {onTouchStart:start,onTouchEnd:cancel,onTouchMove:cancel,onClickCapture:click};
}

/* ─── Animated Value (counter tick-up) ─── */
function AnimatedValue({value,duration=600,format}){
  const [display,setDisplay]=useState(value);
  const prevRef=useRef(value);
  useEffect(()=>{
    const from=typeof prevRef.current==='number'?prevRef.current:0;
    const to=typeof value==='number'?value:0;
    if(typeof value!=='number'||from===to){setDisplay(value);prevRef.current=value;return}
    const start=performance.now();
    const step=t=>{
      const p=Math.min(1,(t-start)/duration);
      const ease=1-Math.pow(1-p,3); // ease-out cubic
      setDisplay(Math.round(from+(to-from)*ease));
      if(p<1)requestAnimationFrame(step);
      else{setDisplay(to);prevRef.current=to}
    };
    requestAnimationFrame(step);
    prevRef.current=to;
  },[value,duration]);
  return format?format(display):display;
}

/* ─── Pull to Refresh ─── */
function PullToRefresh({onRefresh,children}){
  const [pulling,setPulling]=useState(false);
  const [refreshing,setRefreshing]=useState(false);
  const startYRef=useRef(0);
  const pullRef=useRef(0);
  const contentRef=useRef();

  const onTouchStart=e=>{
    if(contentRef.current&&contentRef.current.scrollTop===0){
      startYRef.current=e.touches[0].clientY;
    }else{startYRef.current=0}
  };
  const onTouchMove=e=>{
    if(!startYRef.current||refreshing)return;
    const dy=e.touches[0].clientY-startYRef.current;
    if(dy>20&&dy<120){setPulling(true);pullRef.current=dy}
    else if(dy<=0){setPulling(false);pullRef.current=0}
  };
  const onTouchEnd=()=>{
    if(pullRef.current>60&&!refreshing){
      setRefreshing(true);setPulling(false);
      haptic(15);
      Promise.resolve(onRefresh?.()).finally(()=>{setRefreshing(false)});
    }else{setPulling(false)}
    pullRef.current=0;startYRef.current=0;
  };

  return <div ref={contentRef} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={{flex:1,overflow:'auto'}}>
    <div className={`ptr-indicator ${pulling||refreshing?'pulling':''}`}>
      {refreshing?<><span className="ptr-spinner"/>Refreshing...</>:pulling?'Pull to refresh...':''}
    </div>
    {children}
  </div>;
}

/* ─── Touch Sortable List ─── */
function TouchSortable({items,renderItem,onReorder,keyFn}){
  const [dragIdx,setDragIdx]=useState(-1);
  const [overIdx,setOverIdx]=useState(-1);
  const startYRef=useRef(0);
  const dragActiveRef=useRef(false);
  const itemRefs=useRef([]);

  const onTouchStart=(e,idx)=>{
    startYRef.current=e.touches[0].clientY;
    dragActiveRef.current=false;
    // Start drag after 200ms hold
    const timer=setTimeout(()=>{
      dragActiveRef.current=true;
      setDragIdx(idx);
      haptic(15);
    },200);
    e.currentTarget._dragTimer=timer;
  };

  const onTouchMove=(e,idx)=>{
    if(!dragActiveRef.current){
      // Cancel drag if moved too much before hold triggered
      const dy=Math.abs(e.touches[0].clientY-startYRef.current);
      if(dy>10)clearTimeout(e.currentTarget._dragTimer);
      return;
    }
    e.preventDefault();
    // Find which item we're over
    const y=e.touches[0].clientY;
    for(let i=0;i<itemRefs.current.length;i++){
      const el=itemRefs.current[i];
      if(!el)continue;
      const rect=el.getBoundingClientRect();
      if(y>=rect.top&&y<=rect.bottom){setOverIdx(i);break}
    }
  };

  const onTouchEnd=(e,idx)=>{
    clearTimeout(e.currentTarget._dragTimer);
    if(dragActiveRef.current&&dragIdx>=0&&overIdx>=0&&dragIdx!==overIdx){
      onReorder?.(dragIdx,overIdx);
    }
    setDragIdx(-1);setOverIdx(-1);
    dragActiveRef.current=false;
  };

  return <div>{items.map((item,i)=>(
    <div key={keyFn?keyFn(item,i):i}
      ref={el=>itemRefs.current[i]=el}
      onTouchStart={e=>onTouchStart(e,i)}
      onTouchMove={e=>onTouchMove(e,i)}
      onTouchEnd={e=>onTouchEnd(e,i)}
      style={{
        opacity:dragIdx===i?.5:1,
        background:overIdx===i&&dragIdx>=0?'rgba(160,124,255,.08)':'transparent',
        transition:'background .15s,opacity .15s',
        touchAction:dragIdx>=0?'none':'auto',
      }}>
      {renderItem(item,i,dragIdx===i)}
    </div>
  ))}</div>;
}

/* ─── Swipe-to-Delete Item ─── */
function SwipeItem({children,onDismiss}){
  const ref=useRef();
  const [offset,setOffset]=useState(0);
  const startXRef=useRef(0);

  const onTouchStart=e=>{startXRef.current=e.touches[0].clientX;setOffset(0)};
  const onTouchMove=e=>{
    const dx=e.touches[0].clientX-startXRef.current;
    if(dx<0)setOffset(Math.max(-80,dx));
  };
  const onTouchEnd=()=>{
    if(offset<-60){onDismiss?.();try{navigator.vibrate?.(30)}catch(e){}}
    setOffset(0);
  };

  return <div ref={ref} style={{position:'relative',overflow:'hidden'}}
    onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
    <div style={{position:'absolute',right:0,top:0,bottom:0,width:80,background:'rgba(255,61,90,.15)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--red)',fontSize:16,opacity:offset<-20?1:0,transition:'opacity .15s'}}>{'✕'}</div>
    <div style={{transform:`translateX(${offset}px)`,transition:offset===0?'transform .2s':'none'}}>
      {children}
    </div>
  </div>;
}

/* ─── Main App ─── */
function App(){
  const [authed,setAuthed]=useState(false);
  const [tab,setTab]=useState('home');
  const [status,setStatus]=useState(null);
  const [analytics,setAnalytics]=useState(null);
  const [playlist,setPlaylist]=useState([]);
  const [plSettings,setPlSettings]=useState({});
  const [weekSched,setWeekSched]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [guide,setGuide]=useState(false);
  const schedDirtyRef=useRef(false);
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem('vc_theme')||'dark'}catch(e){return 'dark'}});
  const [installPrompt,setInstallPrompt]=useState(null);
  const [showInstallBanner,setShowInstallBanner]=useState(false);
  const [isIos]=useState(()=>/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream);
  const [isStandalone]=useState(()=>window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true);
  const pollRef=useRef();
  const failCountRef=useRef(0);
  const lastFailTimeRef=useRef(0);

  const poll=useCallback(async()=>{
    try{
      const st=await api('GET','/status');
      failCountRef.current=0;
      setStatus(st);
      if(st.weeklySchedule&&!schedDirtyRef.current)try{setWeekSched(JSON.parse(st.weeklySchedule))}catch(e){}
      if(st.profiles)try{setProfiles(JSON.parse(st.profiles))}catch(e){}
      if(st.pendingChain){doCmd('loadprofile',st.pendingChain,true);toast('Chain: loading '+st.pendingChain,'inf')}
      if(st.playlistSettings)setPlSettings(st.playlistSettings);
    }catch(e){
      if(e.message?.includes('401')||e.message?.includes('expired')){
        const now=Date.now();
        if(now-lastFailTimeRef.current<5000)return;
        lastFailTimeRef.current=now;
        failCountRef.current++;
        if(failCountRef.current===1){
          toast('Connection interrupted \u2014 retrying\u2026','inf');
        }else if(failCountRef.current>=5){
          clearInterval(pollRef.current);S.u=S.t=null;setAuthed(false);
          toast('Session expired \u2014 please reconnect','err');
        }
      }
    }
  },[]);

  const [trendDays,setTrendDays]=useState(30);
  const [videoDetail,setVideoDetail]=useState(null); // {url, plays} for modal

  const loadAnalytics=useCallback(async(days)=>{
    try{const d=await api('GET','/analytics'+(days?'?days='+days:''));setAnalytics(d)}catch(e){}
  },[]);

  const loadVideoDetail=useCallback(async(url)=>{
    try{const d=await api('GET','/analytics?video='+encodeURIComponent(url));setVideoDetail(d)}catch(e){toast('Failed to load video detail','err')}
  },[]);

  const loadPl=useCallback(async()=>{
    try{const r=await api('GET','/playlist');setPlaylist(r.entries||[]);setPlSettings({shuffle:r.shuffle,noRepeat:r.noRepeat,maxVideos:r.maxVideos,startFrom:r.startFrom})}catch(e){}
  },[]);

  const onLogin=useCallback(async()=>{
    setAuthed(true);await poll();loadAnalytics(30);loadPl();
    pollRef.current=setInterval(poll,2500);
    toast('Connected','ok');
  },[poll,loadAnalytics,loadPl]);

  const logout=()=>{
    try{fetch(S.u+'/disconnect',{method:'POST',headers:{'Authorization':'Bearer '+S.t},keepalive:true}).catch(()=>{})}catch(e){}
    clearInterval(pollRef.current);S.u=S.t=null;setAuthed(false);
  };

  useEffect(()=>{
    window.addEventListener('beforeunload',()=>{if(S.t)try{fetch(S.u+'/disconnect',{method:'POST',headers:{'Authorization':'Bearer '+S.t},keepalive:true})}catch(e){}});
    // When tab comes back from background/sleep, immediately poll to refresh heartbeat
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'&&S.t){
        poll(); // immediate heartbeat refresh
        // Restart poll interval (browser may have killed the old one)
        clearInterval(pollRef.current);
        pollRef.current=setInterval(poll,2500);
      }
    });
  },[poll]);

  useEffect(()=>{if(tab==='home')loadAnalytics(trendDays);if(tab==='list')loadPl();},[tab,trendDays]);

  // Theme management
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    try{localStorage.setItem('vc_theme',theme)}catch(e){}
  },[theme]);
  const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');

  // Meta theme-color (changes with play state for mobile status bar)
  useEffect(()=>{
    const meta=document.getElementById('meta-theme');
    if(meta)meta.content=playing?(theme==='dark'?'#0a1a10':'#e8f5ec'):(theme==='dark'?'#06060c':'#f4f2f8');
  },[playing,theme]);

  // PWA install prompt (Chrome/Android) + iOS detection
  useEffect(()=>{
    // Already installed as standalone — don't show banner
    if(isStandalone)return;
    // Chrome/Android: capture the native prompt
    const handler=e=>{e.preventDefault();setInstallPrompt(e);setShowInstallBanner(true)};
    window.addEventListener('beforeinstallprompt',handler);
    // iOS: show manual instruction banner after 3 seconds (no native prompt exists)
    let iosTimer;
    if(isIos){
      const dismissed=sessionStorage.getItem('vc_ios_dismiss');
      if(!dismissed)iosTimer=setTimeout(()=>setShowInstallBanner(true),3000);
    }
    return ()=>{window.removeEventListener('beforeinstallprompt',handler);clearTimeout(iosTimer)};
  },[isIos,isStandalone]);
  const doInstall=async()=>{
    if(installPrompt){installPrompt.prompt();await installPrompt.userChoice;setInstallPrompt(null)}
    setShowInstallBanner(false);
  };
  const dismissInstall=()=>{setShowInstallBanner(false);if(isIos)sessionStorage.setItem('vc_ios_dismiss','1')};

  const doCmd=async(n,v,silent)=>{
    if(!silent)haptic(10);
    try{const r=await cmd(n,v);if(!silent)toast('\u2713 '+n,'ok');setTimeout(poll,300);return r?.message}catch(e){toast(e.message,'err');return null}
  };

  const plOp=async(action,data)=>{
    try{await api('POST','/playlist',{action,...data});loadPl();toast('\u2713 '+action,'ok')}catch(e){toast(e.message,'err')}
  };

  // Extract state

  const o=st.pendingOptions||{};

  const pos=st.videoPosition||0;
  const curSec=st.videoTimeSec||0;
  const lenSec=st.videoLengthSec||0;
  const an=analytics||{};

        <span className="logo">VoidCapture</span>
        <span className={`pill ${playing?'live':'idle'}`}><span className="dot"/>{playing?'Playing':'Idle'}</span>
        <span className="tz">{tz}</span>
        <div className="top-actions">
          <button className="theme-btn" onClick={toggleTheme} title={theme==='dark'?'Light mode':'Dark mode'}>{theme==='dark'?'\u2600':'\u263e'}</button>
          <button className="tbtn" onClick={()=>{poll();toast('Synced','inf')}}>{'\u21bb'}</button>
          <button className="tbtn danger" onClick={()=>doCmd('panic')}>{'\u26a0'} Panic</button>
          <button className="tbtn" onClick={()=>setGuide(true)}>?</button>
          <button className="tbtn" onClick={logout}>Logout</button>
        </div>
      </div>

          <div key={k} className={`nav-item ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</div>)}

          <button key={k} className={tab===k?'active':''} onClick={()=>setTab(k)}><span className="icon">{i}</span>{l}</button>)}
      </div>
