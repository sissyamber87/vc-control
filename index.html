<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" id="meta-theme" content="#06060c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoidCapture">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>VoidCapture</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ═══ DESIGN SYSTEM — Discord/Spotify Bold Dark ═══ */
:root{
--bg:#0c0c0c;--bg2:#111113;--bg3:#161618;
--card:#1a1a1d;--card2:#202024;--card-hover:#222226;
--bdr:#2a2a2e;--bdr2:#3a3a3e;--bdr-accent:rgba(124,92,246,.25);
--txt:#e5e5e7;--txt2:#b0b0b4;--dim:#808086;--mute:#56565c;
--accent:#7c5cf6;--accent2:#9b7cff;--accent-dim:rgba(124,92,246,.12);--accent-glow:rgba(124,92,246,.25);
--green:#1db954;--green-dim:rgba(29,185,84,.12);
--red:#ed4245;--red-dim:rgba(237,66,69,.12);
--amber:#faa61a;--amber-dim:rgba(250,166,26,.12);
--blue:#5865f2;--blue-dim:rgba(88,101,242,.12);
--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
--r:8px;--r2:12px;--r3:16px;
}
[data-theme="light"]{
--bg:#f5f5f5;--bg2:#eee;--bg3:#e5e5e5;
--card:#fff;--card2:#fafafa;--card-hover:#f5f5f7;
--bdr:#ddd;--bdr2:#ccc;--bdr-accent:rgba(124,92,246,.2);
--txt:#1a1a1d;--txt2:#444;--dim:#777;--mute:#aaa;
--accent:#6d4ce0;--accent2:#8b6cf6;--accent-dim:rgba(109,76,224,.08);--accent-glow:rgba(109,76,224,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--txt);overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--mute);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
/* ═══ ACCESSIBILITY ═══ */
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
/* ═══ LAYOUT ═══ */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px 16px 12px;font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.02em}
.sidebar-brand small{display:block;font-size:10px;font-weight:500;color:var(--mute);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.sidebar-nav{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:2px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;transition:all .15s;min-height:44px;user-select:none}
.sidebar-item:hover{background:var(--accent-dim);color:var(--txt2)}
.sidebar-item.active{background:var(--accent-dim);color:var(--accent)}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:12px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:6px}
.sidebar-meta{font-size:10px;color:var(--mute);font-family:var(--mono);display:flex;align-items:center;gap:6px}
.sidebar-meta .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-meta .dot.on{background:var(--green)}.sidebar-meta .dot.off{background:var(--mute)}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:6px}
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px 12px 80px}
  .mobile-bar{display:flex!important}
}
@media(min-width:769px){.mobile-bar{display:none!important}}
.mobile-bar{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--bg2);border-top:1px solid var(--bdr);display:flex;z-index:100;padding:0 8px;align-items:stretch}
.mobile-bar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--mute);font-size:9px;font-weight:600;font-family:var(--font);cursor:pointer;min-height:56px;position:relative;transition:color .15s}
.mobile-bar button.active{color:var(--accent)}
.mobile-bar button.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.mobile-bar button .mi{font-size:20px;line-height:1}
/* ═══ PAGE HEADER ═══ */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-hdr h2{font-size:22px;font-weight:700;letter-spacing:-.02em}
.page-hdr-actions{display:flex;gap:8px;align-items:center}
/* ═══ CARDS ═══ */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;margin-bottom:12px;transition:border-color .15s}
.card:hover{border-color:var(--bdr2)}
.card-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card-title .ci{font-size:15px;color:var(--accent)}
.card-sub{font-size:11px;color:var(--dim);margin-top:-6px;margin-bottom:10px}
/* ═══ STAT CARDS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:480px){.stats-row{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden}
.stat-card .val{font-size:22px;font-weight:800;letter-spacing:-.02em;font-family:var(--mono);color:var(--txt)}
.stat-card .lbl{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.stat-card.purple{border-left:3px solid var(--accent)}.stat-card.purple .val{color:var(--accent)}
.stat-card.green{border-left:3px solid var(--green)}.stat-card.green .val{color:var(--green)}
.stat-card.blue{border-left:3px solid var(--blue)}.stat-card.blue .val{color:var(--blue)}
.stat-card.amber{border-left:3px solid var(--amber)}.stat-card.amber .val{color:var(--amber)}
/* ═══ BUTTONS ═══ */
.btn{border:none;border-radius:var(--r);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:6px;min-height:36px}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent2)}
.btn-g{background:var(--card2);color:var(--txt2);border:1px solid var(--bdr)}.btn-g:hover{border-color:var(--bdr2);color:var(--txt)}
.btn-d{background:var(--red-dim);color:var(--red);border:1px solid rgba(237,66,69,.2)}.btn-d:hover{background:rgba(237,66,69,.2)}
.btn-sm{padding:4px 10px;font-size:11px;min-height:28px}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--r);background:var(--card2);border:1px solid var(--bdr);color:var(--dim);cursor:pointer;transition:all .15s}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
/* ═══ INPUTS ═══ */
input[type="text"],input[type="password"],input[type="number"],textarea,select{
  background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;
  font-size:13px;color:var(--txt);font-family:var(--font);outline:none;transition:border-color .15s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--mute)}
/* ═══ TOGGLE ═══ */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.toggle-label{font-size:13px;font-weight:500;color:var(--txt2)}
.switch{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch span{position:absolute;inset:0;background:var(--card2);border:1px solid var(--bdr);border-radius:22px;transition:all .2s}
.switch span::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;background:var(--dim);transition:all .2s}
.switch input:checked+span{background:var(--accent-dim);border-color:var(--accent)}
.switch input:checked+span::after{transform:translateX(18px);background:var(--accent)}
/* ═══ SLIDER ═══ */
.slider-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.slider-row label{display:flex;justify-content:space-between;font-size:13px;font-weight:500;color:var(--txt2);margin-bottom:6px}
.slider-row label span{font-family:var(--mono);color:var(--accent);font-weight:600}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bdr);outline:none;margin:4px 0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
/* ═══ NOW PLAYING ═══ */
.np-idle{text-align:center;padding:32px 16px;color:var(--mute)}
.np-idle .np-icon{font-size:40px;margin-bottom:8px;opacity:.3}
.np-idle .np-msg{font-size:13px}
.np-active{padding:4px 0}
.np-meta{text-align:center;margin-bottom:12px}
.np-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:2px}
.np-channel{font-size:11px;color:var(--dim)}
.np-progress{height:4px;border-radius:2px;background:var(--bdr);margin:12px 0 4px;overflow:hidden;cursor:pointer}
.np-bar{height:100%;border-radius:2px;background:var(--accent);transition:width .3s ease}
.np-time{display:flex;justify-content:space-between;font-size:10px;color:var(--mute);font-family:var(--mono);margin-bottom:12px}
.np-controls{display:flex;justify-content:center;gap:8px}
.np-info{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);border-radius:var(--r);overflow:hidden;margin-top:12px}
.np-info-cell{background:var(--card);padding:8px 12px}
.np-info-cell .k{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:600;letter-spacing:.04em}
.np-info-cell .v{font-size:14px;font-weight:700;color:var(--txt);font-family:var(--mono)}
/* ═══ QUEUE ═══ */
.q-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
.q-item:hover{background:var(--accent-dim);margin:0 -16px;padding:8px 16px}
.q-num{width:24px;font-size:11px;color:var(--mute);font-family:var(--mono);text-align:center;flex-shrink:0}
.q-thumb{width:48px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg3)}
.q-meta{flex:1;min-width:0}
.q-meta-title{font-size:12px;font-weight:500;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-meta-sub{font-size:10px;color:var(--mute);margin-top:1px}
.q-rm{color:var(--mute);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;transition:all .15s;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center}
.q-rm:hover{color:var(--red);background:var(--red-dim)}
/* ═══ HEATMAP ═══ */
.heatmap{display:grid;grid-template-columns:repeat(24,1fr);gap:2px}
.heatmap-cell{aspect-ratio:1;border-radius:2px;transition:all .15s;position:relative}
.heatmap-cell:hover{transform:scale(1.3);z-index:1}
.heatmap-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--mute);font-family:var(--mono);margin-top:4px;padding:0 1px}
.heatmap-day{font-size:9px;color:var(--mute);font-family:var(--mono);text-align:right;padding-right:6px;line-height:1}
/* ═══ LOGIN ═══ */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:24px;background:var(--bg)}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r3);padding:32px;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--accent))}
.login-card h1{font-size:28px;font-weight:800;color:var(--txt);text-align:center;letter-spacing:-.03em;margin-bottom:2px}
.login-card .tag{font-size:11px;color:var(--mute);text-align:center;text-transform:uppercase;letter-spacing:.15em;margin-bottom:28px;font-weight:500}
.login-card .field{margin-bottom:14px}
.login-card .field label{display:block;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-card .field input{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;font-size:14px}
.login-card .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;margin-top:8px}
.login-btn:hover{background:var(--accent2)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{text-align:center;color:var(--red);font-size:12px;margin-top:10px;min-height:18px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* ═══ TOAST ═══ */
.toast-container{position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--txt);background:var(--card2);border:1px solid var(--bdr);pointer-events:auto;animation:toastIn .25s ease;font-family:var(--font);max-width:320px}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}.toast.inf{border-left:3px solid var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
/* ═══ ACHIEVEMENT ═══ */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.ach-badge{text-align:center;padding:12px 8px;border-radius:var(--r2);border:1px solid var(--bdr);background:var(--card);transition:all .2s;cursor:default}
.ach-badge.earned{border-color:var(--accent);background:var(--accent-dim)}
.ach-badge .ach-icon{font-size:24px;margin-bottom:4px}
.ach-badge .ach-name{font-size:10px;font-weight:700;color:var(--txt)}
.ach-badge .ach-cat{font-size:8px;color:var(--mute);text-transform:uppercase;letter-spacing:.05em}
.ach-badge .ach-prog{height:3px;border-radius:2px;background:var(--bdr);margin-top:6px;overflow:hidden}
.ach-badge .ach-prog-bar{height:100%;border-radius:2px;background:var(--accent);transition:width .3s}
/* ═══ SUGGESTION ═══ */
.suggestion-card{background:var(--accent-dim);border:1px solid var(--bdr-accent);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.suggestion-card .sug-icon{font-size:22px;flex-shrink:0}
.suggestion-card .sug-text{flex:1;font-size:13px;color:var(--txt2)}
/* ═══ INSIGHT ═══ */
.insight-card{background:var(--green-dim);border:1px solid rgba(29,185,84,.15);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center}
.insight-val{font-size:20px;font-weight:800;color:var(--txt);font-family:var(--mono)}
.insight-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600;letter-spacing:.04em;margin-top:2px}
/* ═══ ONBOARDING ═══ */
.onboard-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;padding:24px}
.onboard-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--r3);padding:40px 32px;max-width:400px;width:100%;text-align:center}
.onboard-icon{font-size:56px;margin-bottom:16px}
.onboard-title{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:8px;letter-spacing:-.02em}
.onboard-body{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:24px}
.onboard-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.onboard-dot{width:8px;height:8px;border-radius:4px;background:var(--bdr);transition:all .2s}
.onboard-dot.active{background:var(--accent);width:20px}
/* ═══ OFFLINE ═══ */
.offline-bar{background:var(--amber-dim);border:1px solid rgba(250,166,26,.15);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px}
/* ═══ WIDGET CONFIG ═══ */
.widget-cfg{border:1px solid var(--accent);background:var(--accent-dim);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.widget-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.widget-row label{flex:1;font-size:12px;color:var(--txt2)}
/* ═══ SMART PLAYLIST ═══ */
.sp-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.sp-item .sp-name{font-size:12px;font-weight:600;color:var(--txt)}
.sp-item .sp-count{font-size:10px;color:var(--mute);margin-left:4px}

/* ═══ GUIDE OVERLAY ═══ */
.guide-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.9);overflow-y:auto;padding:24px;display:none}
.guide-overlay.open{display:block}
.guide-inner{max-width:600px;margin:0 auto;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r3);padding:32px;position:relative}
.guide-inner h2{font-size:20px;font-weight:800;margin-bottom:16px;color:var(--txt)}
.guide-inner .gs{font-size:14px;font-weight:700;color:var(--accent);margin-top:16px;margin-bottom:4px}
.guide-inner p{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:8px}
/* ═══ INSTALL BANNER ═══ */
.install-banner{position:fixed;bottom:64px;left:12px;right:12px;z-index:99;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.ib-text{flex:1;font-size:12px;color:var(--txt2);line-height:1.4}
.ib-text strong{display:block;color:var(--txt);font-size:13px;margin-bottom:2px}
/* ═══ MISC LEGACY ═══ */
.row{display:flex;gap:8px;align-items:center}
.mq-preview{font-family:var(--mono);font-size:11px;padding:8px;background:var(--bg3);border-radius:var(--r);margin-bottom:8px;word-break:break-all}
.hist-item{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:10px}
.hist-time{color:var(--mute);font-family:var(--mono);flex-shrink:0;min-width:48px}
.hist-url{color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tv-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
.tv-item:hover{background:var(--accent-dim)}
.tv-url{font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tv-stats{font-size:10px;color:var(--dim);font-family:var(--mono);flex-shrink:0;min-width:48px;text-align:right}
.time-picker{display:flex;align-items:center;gap:4px}
.tp-select{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:6px 8px;font-size:13px;color:var(--txt);font-family:var(--mono)}
.tp-sep{font-size:16px;color:var(--dim);font-weight:700}
.tp-ampm{font-size:11px;color:var(--mute);font-family:var(--mono);margin-left:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─── API Layer ─── */
let S={u:null,t:null};
const api=async(m,p,b)=>{
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(S.t)o.headers['Authorization']='Bearer '+S.t;
  if(b!==undefined)o.body=JSON.stringify(b);
  const r=await fetch(S.u+p,o);
  if(!r.ok){const e=await r.json().catch(()=>({error:'HTTP '+r.status}));throw new Error(e.error||e.message||'HTTP '+r.status)}
  return r.json();
};
const cmd=async(n,v)=>{
  const b={cmd:n};if(v!==undefined)b.value=v;
  const r=await api('POST','/command',b);
  if(!r.success)throw new Error(r.message||'failed');
  return r;
};

/* ─── Utils ─── */
const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
const fmtSec=s=>{s=Math.max(0,Math.floor(s));const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec};
const fmtLocal=iso=>{try{return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',timeZone:tz})}catch(e){return iso}};
const trunc=(s,n)=>s&&s.length>n?s.slice(0,n)+'\u2026':s;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ─── Toast System ─── */
let toastId=0;
function Confetti({active}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    if(!active||!canvasRef.current)return;
    const c=canvasRef.current,ctx=c.getContext('2d');
    c.width=window.innerWidth;c.height=window.innerHeight;
    const particles=[];
    const colors=['#8b5cf6','#22c55e','#f59e0b','#3b82f6','#ef4444','#ec4899'];
    for(let i=0;i<80;i++)particles.push({x:c.width/2+Math.random()*200-100,y:c.height/3,vx:(Math.random()-0.5)*12,vy:Math.random()*-14-4,r:Math.random()*4+2,color:colors[Math.floor(Math.random()*colors.length)],life:1});
    let frame=0;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      let alive=false;
      particles.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life-=0.012;p.vx*=0.99;
        if(p.life<=0)return;alive=true;
        ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
      if(alive&&frame<120){frame++;requestAnimationFrame(draw)}
    };
    draw();
  },[active]);
  if(!active)return null;
  return <canvas ref={canvasRef} style={{position:'fixed',inset:0,zIndex:9997,pointerEvents:'none'}}/>;
}

function ToastContainer(){
  const [toasts,setToasts]=useState([]);
  window._addToast=(msg,type='ok')=>{
    const id=++toastId;
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  };
  return <div className="toasts">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}</div>;
}
const toast=(m,t)=>window._addToast?.(m,t);

/* ─── Login Screen ─── */
function LoginScreen({onLogin}){
  const [url,setUrl]=useState('');
  const [code,setCode]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const codeRef=useRef(),pinRef=useRef();

  useEffect(()=>{
    try{const h=window.location.hash.slice(1);if(!h)return;const p={};h.split('&').forEach(x=>{const[k,v]=x.split('=');if(k&&v)p[decodeURIComponent(k)]=decodeURIComponent(v)});
    if(p.T)setUrl(p.T);if(p.C)setCode(p.C.toUpperCase());history.replaceState(null,'',window.location.pathname)}catch(e){}
  },[]);

  const submit=async()=>{
    setErr('');
    if(!url.startsWith('https://')){setErr('URL must start with https://');return}
    if(code.length!==6){setErr('Code must be 6 characters');return}
    if(!/^\d{6}$/.test(pin)){setErr('PIN must be 6 digits');return}
    setBusy(true);S.u=url.replace(/\/+$/,'');
    try{
      const res=await api('POST','/auth',{code,pin});
      if(!res.ok){setErr(res.error||'Auth failed');setBusy(false);return}
      S.t=res.token;onLogin();
    }catch(e){
      S.u=S.t=null;const m=e.message||'';
      if(m.includes('Failed to fetch')||m.includes('NetworkError'))setErr('Cannot reach tunnel URL.');
      else if(m.includes('401'))setErr('Incorrect code or PIN.');
      else setErr('Failed: '+m);setBusy(false);
    }
  };

  return <div className="login-wrap">
    <div className="login-card">
      <h1>VoidCapture</h1>
      <div className="tag">Remote Controller</div>
      <div className="field"><label>Tunnel URL</label><input type="text" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.trycloudflare.com" aria-label="Tunnel URL" onKeyDown={e=>e.key==='Enter'&&codeRef.current?.focus()} autoComplete="off" spellCheck="false"/></div>
      <div className="field"><label>Session Code</label><input ref={codeRef} type="text" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="ABC123" maxLength={6} aria-label="Session code" style={{textTransform:'uppercase',letterSpacing:'.2em',fontFamily:'var(--mono)'}} onKeyDown={e=>e.key==='Enter'&&pinRef.current?.focus()} autoComplete="off"/></div>
      <div className="field"><label>PIN</label><input ref={pinRef} type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder={'\u2022\u2022\u2022\u2022\u2022\u2022'} maxLength={6} inputMode="numeric" onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="off"/></div>
      <button className="login-btn" onClick={submit} disabled={busy}>{busy?<><span className="spin"/> Connecting{'\u2026'}</>:'Connect'}</button>
      <div className="login-err">{err||''}</div>
    </div>
  </div>;
}

/* ─── Onboarding Wizard (v16.0) ─── */
function OnboardingWizard({onComplete}){
  const [step,setStep]=useState(0);
  const steps=[
    {icon:'\u2728',title:'Welcome to VoidCapture',body:'Your personal video session manager. Control playback remotely, track your habits, and build a watching routine \u2014 all from your phone.'},
    {icon:'\u26a1',title:'How It Works',body:'VoidCapture runs on your desktop and creates a secure tunnel. You connect from any device using the tunnel URL + session code + PIN. Everything stays private.'},
    {icon:'\u25b6',title:'Queue Videos',body:'Use the browser extension to queue videos from any site with one click. Or paste URLs directly in the Queue tab. Videos play fullscreen on your desktop.'},
    {icon:'\u2699',title:'Take Control',body:'Adjust volume, speed, and marquee text remotely. Set session time limits. Lock the panic button. Everything updates in real-time over WebSocket.'},
    {icon:'\u2b50',title:'Track & Grow',body:'Watch your streaks grow, unlock achievements, and hit daily goals. Smart playlists auto-generate from your watch patterns. The app learns what you like.'},
    {icon:'\u2764',title:'You\u2019re Ready!',body:'Explore the tabs, queue your first video, and set a daily goal. VoidCapture gets better the more you use it.'},
  ];
  const s=steps[step];
  const finish=()=>{localStorage.setItem('vc-onboarded','1');onComplete()};
  return <div style={{position:'fixed',inset:0,zIndex:9998,background:'rgba(0,0,0,.85)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:'var(--card)',border:'1px solid var(--bdr2)',borderRadius:'var(--r3)',padding:32,maxWidth:360,width:'100%',textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:12}}>{s.icon}</div>
      <h2 style={{fontSize:18,fontWeight:700,color:'var(--txt)',marginBottom:8}}>{s.title}</h2>
      <p style={{fontSize:13,color:'var(--dim)',lineHeight:1.6,marginBottom:24}}>{s.body}</p>
      <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:16}}>
        {steps.map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:4,background:i===step?'var(--iris)':'rgba(255,255,255,.1)',transition:'all .2s'}}/>)}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        {step>0&&<button className="btn btn-g" onClick={()=>setStep(step-1)} style={{padding:'8px 16px'}}>Back</button>}
        {step<steps.length-1?
          <button className="btn btn-p" onClick={()=>setStep(step+1)} style={{padding:'8px 20px'}}>Next</button>:
          <button className="btn btn-p" onClick={finish} style={{padding:'8px 20px'}}>Get Started</button>}
      </div>
      <button onClick={finish} style={{background:'none',border:'none',color:'var(--mute)',fontSize:11,marginTop:12,cursor:'pointer',padding:4}}>Skip tour</button>
    </div>
  </div>;
}

/* ─── Progress Ring ─── */
function ProgressRing({progress=0,time='0:00',total='--:--',url,playing,onVolumeChange,onSpeedChange}){
  const ringRef=useRef();
  useSwipeGesture(ringRef,{
    onSwipeUp:()=>{onVolumeChange?.(10);try{navigator.vibrate?.(15)}catch(e){}},
    onSwipeDown:()=>{onVolumeChange?.(-10);try{navigator.vibrate?.(15)}catch(e){}},
    onSwipeRight:()=>{onSpeedChange?.(0.1);try{navigator.vibrate?.(15)}catch(e){}},
    onSwipeLeft:()=>{onSpeedChange?.(-0.1);try{navigator.vibrate?.(15)}catch(e){}},
    threshold:30
  });
  const r=68,c=2*Math.PI*r;
  const offset=c-(progress*c);
  return <div className="ring-wrap">
    <div className="ring-container" ref={ringRef}>
      {playing&&<div className="ring-pulse"/>}
      <svg viewBox="0 0 160 160">
        <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="var(--v2)"/><stop offset="100%" stopColor="var(--iris)"/></linearGradient></defs>
        <circle className="ring-bg" cx="80" cy="80" r={r}/>
        <circle className="ring-fill" cx="80" cy="80" r={r} strokeDasharray={c} strokeDashoffset={offset}/>
      </svg>
      <div className="ring-center">
        <div className="ring-time">{time}</div>
        <div className="ring-label">{playing?'of '+total:'Idle'}</div>
        {url&&<div className="ring-url" title={url}>{trunc(url,20)}</div>}
      </div>
    </div>
  </div>;
}

/* ─── Trend Chart ─── */
function TrendChart({data}){
  const canvasRef=useRef();
  const chartRef=useRef();
  useEffect(()=>{
    if(!canvasRef.current||!data?.length)return;
    if(chartRef.current)chartRef.current.destroy();
    const ctx=canvasRef.current.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,140);
    grad.addColorStop(0,'rgba(160,124,255,.3)');grad.addColorStop(1,'rgba(160,124,255,.01)');
    chartRef.current=new Chart(ctx,{type:'line',data:{
      labels:data.map(d=>d.date?.slice(5)||''),
      datasets:[{data:data.map(d=>Math.round((d.totalSec||0)/60)),fill:true,backgroundColor:grad,
        borderColor:'rgba(160,124,255,.8)',borderWidth:2,tension:.4,pointRadius:0,pointHitRadius:8,
        pointHoverRadius:4,pointHoverBackgroundColor:'#a07cff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>c.raw+' min'},backgroundColor:'rgba(14,12,28,.9)',titleColor:'#a07cff',bodyColor:'#ede8f6',borderColor:'rgba(130,90,255,.3)',borderWidth:1}},
        scales:{x:{ticks:{color:'#4e4968',font:{size:8,family:'JetBrains Mono'},maxRotation:0,maxTicksLimit:8},grid:{display:false},border:{display:false}},
          y:{ticks:{color:'#4e4968',font:{size:8,family:'JetBrains Mono'},callback:v=>v+'m'},grid:{color:'rgba(255,255,255,.02)'},border:{display:false},beginAtZero:true}},
        interaction:{intersect:false,mode:'index'}}});
    return ()=>{if(chartRef.current)chartRef.current.destroy()};
  },[data]);
  return <div className="chart-wrap"><canvas ref={canvasRef}/></div>;
}

/* ─── Heatmap ─── */
function SessionHeatmap({data}){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const max=Math.max(1,...Object.values(data||{}).map(v=>Number(v)||0));
  return <div>
    {days.map((d,di)=><div key={d} style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
      <span className="heatmap-day" style={{width:28,flexShrink:0}}>{d}</span>
      <div style={{display:'flex',gap:2,flex:1}}>
        {Array.from({length:24},(_,h)=>{
          const v=Number(data?.[`${di}-${h}`])||0;
          const pct=v/max;
          const bg=pct>0?`rgba(124,92,246,${.1+pct*.6})`:'rgba(255,255,255,.03)';
          return <div key={h} className="heatmap-cell" style={{flex:1,height:14,borderRadius:2,background:bg}} title={`${d} ${h}:00 \u2014 ${Math.round(v/60)}min`}/>;
        })}
      </div>
    </div>)}
    <div style={{display:'flex',gap:2,marginLeft:32}}>
      {[0,3,6,9,12,15,18,21].map(h=><span key={h} style={{flex:3,fontSize:8,color:'var(--mute)',fontFamily:'var(--mono)'}}>{h}</span>)}
    </div>
  </div>;
}

/* ─── Time Picker (select dropdowns) ─── */
function TimePicker({hour,min,onHourChange,onMinChange}){
  const hours=Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));
  const mins=Array.from({length:12},(_,i)=>String(i*5).padStart(2,'0'));
  return <div className="time-picker">
    <select className="tp-select" value={hour} onChange={e=>onHourChange(e.target.value)}>
      {hours.map(h=><option key={h} value={h}>{h}</option>)}
    </select>
    <span className="tp-sep">:</span>
    <select className="tp-select" value={min} onChange={e=>onMinChange(e.target.value)}>
      {mins.map(m=><option key={m} value={m}>{m}</option>)}
    </select>
    <span className="tp-ampm">{parseInt(hour)>=12?'PM':'AM'}</span>
  </div>;
}

function ScheduleEditor({initial,onSave,onCancel}){
  const dayList=[{k:'mon',l:'Mon'},{k:'tue',l:'Tue'},{k:'wed',l:'Wed'},{k:'thu',l:'Thu'},{k:'fri',l:'Fri'},{k:'sat',l:'Sat'},{k:'sun',l:'Sun'}];
  const [name,setName]=useState(()=>initial?.name||'');
  const [days,setDays]=useState(()=>initial?initial.days:['mon']);
  const [hour,setHour]=useState(()=>initial?initial.hour:'22');
  const [min,setMin]=useState(()=>initial?initial.min:'00');
  const [urls,setUrls]=useState(()=>initial?.urls?.join('\n')||'');
  const [showUrls,setShowUrls]=useState(()=>!!(initial?.urls?.length));

  const toggleDay=d=>{
    setDays(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d]);
  };
  const save=()=>{
    if(!days.length){toast('Select at least one day','err');return}
    const urlList=urls.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http'));
    onSave({name:name.trim(),days,hour,min,urls:urlList.length?urlList:undefined});
  };
  const presets=[
    {label:'Weeknights',days:['mon','tue','wed','thu','fri']},
    {label:'Weekends',days:['sat','sun']},
    {label:'Every day',days:['mon','tue','wed','thu','fri','sat','sun']},
  ];

  return <div className="sched-editor">
    <div style={{fontSize:11,color:'var(--dim)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>
      {initial?'Edit Entry':'New Schedule Entry'}
    </div>
    <div className="field" style={{marginBottom:10}}>
      <label style={{fontSize:10,color:'var(--dim)'}}>Name (optional)</label>
      <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Nightly session, Weekend deep..." style={{fontSize:13}}/>
    </div>
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
      {presets.map(p=><button key={p.label} className="btn btn-g" style={{fontSize:9,padding:'4px 10px'}}
        onClick={()=>setDays(p.days)}>{p.label}</button>)}
    </div>
    <div className="day-pills">
      {dayList.map(d=><div key={d.k} className={`day-pill${days.includes(d.k)?' on':''}`}
        onClick={()=>toggleDay(d.k)}>{d.l}</div>)}
    </div>
    <TimePicker hour={hour} min={min} onHourChange={setHour} onMinChange={setMin}/>
    <div style={{textAlign:'center',fontFamily:'var(--mono)',fontSize:13,color:'var(--iris)',margin:'8px 0'}}>
      {name&&<span style={{color:'var(--txt)',fontWeight:600}}>{name} — </span>}
      {days.map(d=>d.charAt(0).toUpperCase()+d.slice(1)).join(', ')} at {hour}:{min}
    </div>
    <div style={{margin:'10px 0'}}>
      <button className="btn btn-g" style={{fontSize:10,marginBottom:6}} onClick={()=>setShowUrls(!showUrls)}>
        {showUrls?'\u25bc Hide playlist':'\u25b6 Assign custom playlist'} {urls.split('\n').filter(l=>l.trim()).length>0?`(${urls.split('\n').filter(l=>l.trim()).length} URLs)`:''}
      </button>
      {showUrls&&<div>
        <textarea value={urls} onChange={e=>setUrls(e.target.value)} rows={4} placeholder="Paste URLs, one per line...&#10;Leave empty to use the default playlist" style={{fontSize:11}}/>
        <div style={{fontSize:9,color:'var(--mute)',marginTop:2}}>Leave empty to use the default playlist</div>
      </div>}
    </div>
    <div className="row" style={{justifyContent:'center'}}>
      <button className="btn btn-p" onClick={save}>{initial?'Update':'Add Schedule'}</button>
      <button className="btn btn-g" onClick={onCancel}>Cancel</button>
    </div>
  </div>;
}

function ScheduleEntryCard({entry,onDelete,onEdit}){
  const t=entry.time.split(':');
  const h=parseInt(t[0]),m=t[1];
  const ampm=h>=12?'PM':'AM';
  const h12=h===0?12:h>12?h-12:h;
  const timeStr=`${h12}:${m} ${ampm}`;
  const hasUrls=entry.urls&&entry.urls.length>0;
  return <div className="sched-entry">
    <div className="se-time">{timeStr}</div>
    <div style={{flex:1}}>
      {entry.name&&<div style={{fontSize:12,fontWeight:600,color:'var(--txt)',marginBottom:3}}>{entry.name}</div>}
      <div className="se-days">
        {entry.days.map(d=><span key={d} className="se-day">{d}</span>)}
      </div>
      {hasUrls&&<div className="se-urls" style={{marginTop:4}}>{'\u2714'} {entry.urls.length} custom URLs</div>}
      {!hasUrls&&<div className="se-urls" style={{marginTop:4}}>Default playlist</div>}
    </div>
    <div className="se-actions">
      <button className="btn btn-g" style={{padding:'4px 8px',fontSize:10}} onClick={onEdit}>{'\u270e'}</button>
      <button className="btn btn-d" style={{padding:'4px 8px',fontSize:10}} onClick={onDelete}>{'\u2715'}</button>
    </div>
  </div>;
}

function ScheduleCard({weekSched,setWeekSched,doCmd,schedDirtyRef}){
  const [editing,setEditing]=useState(false);
  const [adding,setAdding]=useState(false);

  // Mark dirty when entering edit mode, clean when leaving
  useEffect(()=>{
    schedDirtyRef.current=adding||!!editing;
  },[adding,editing,schedDirtyRef]);

  // Auto-save helper: update state + immediately push to server
  const autoSave=(next)=>{
    setWeekSched(next);
    // Push to server immediately — no separate save button needed
    doCmd('weeklyschedule',JSON.stringify(next),true);
    schedDirtyRef.current=false;
  };

  // Group raw schedule entries by time+name for display
  const grouped=useMemo(()=>{
    const map=new Map();
    (weekSched||[]).forEach((e,i)=>{
      const key=e.time+'|'+(e.name||'');
      if(!map.has(key))map.set(key,{time:e.time,name:e.name||'',days:[],urls:e.urls,indices:[]});
      const g=map.get(key);
      if(!g.days.includes(e.day))g.days.push(e.day);
      g.indices.push(i);
      if(e.urls&&e.urls.length)g.urls=e.urls;
    });
    return [...map.values()].sort((a,b)=>a.time.localeCompare(b.time));
  },[weekSched]);

  const saveEntry=({name,days,hour,min,urls})=>{
    const time=hour+':'+min;
    let next=[...(weekSched||[])];
    if(editing&&editing.entry){
      const old=editing.entry;
      next=next.filter(e=>!(e.time===old.time&&old.days.includes(e.day)&&(e.name||'')===(old.name||'')));
    }
    days.forEach(d=>{
      if(!next.find(e=>e.day===d&&e.time===time&&(e.name||'')===(name||''))){
        const entry={day:d,time};
        if(name)entry.name=name;
        if(urls&&urls.length)entry.urls=urls;
        next.push(entry);
      }
    });
    autoSave(next);
    setAdding(false);setEditing(false);
    toast('Schedule saved','ok');
  };

  const deleteGroup=(group)=>{
    if(!confirm(`Delete "${group.name||group.time}" schedule?`))return;
    const next=(weekSched||[]).filter(e=>!(e.time===group.time&&group.days.includes(e.day)&&(e.name||'')===(group.name||'')));
    autoSave(next);
    toast('Schedule removed','ok');
  };

  const editGroup=(group)=>{
    setEditing({entry:group});
    setAdding(false);
  };

  return <div className="card">
    <div className="card-title"><span className="ci">{'\u23f1'}</span> Schedule</div>

    <div className="row" style={{marginBottom:14}}>
      <button className="btn btn-s" onClick={()=>doCmd('autostartnow')}>{'\u25b6'} Start Now</button>
      <button className="btn btn-g" onClick={()=>doCmd('cancelschedule')}>{'\u2715'} Cancel</button>
    </div>

    <NumRow label="Idle Auto-Start" unit="min" defVal={0} onSet={v=>doCmd('idlestart',v)} info="0 = off"/>
    <NumRow label="Delay Start" unit="min" defVal={0} onSet={v=>doCmd('delay',v)} info="N minutes"/>

    <div className="sec-title" style={{marginTop:16}}>Weekly Schedule</div>

    {grouped.map((g,i)=>

function SkeletonCard(){return <div className="skeleton skel-card"/>}

/* ─── Touch Gesture Hook ─── */
function useSwipeGesture(ref, {onSwipeLeft,onSwipeRight,onSwipeUp,onSwipeDown,threshold=50}={}){
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    let startX=0,startY=0,tracking=false;
    const onStart=e=>{const t=e.touches[0];startX=t.clientX;startY=t.clientY;tracking=true};
    const onEnd=e=>{
      if(!tracking)return;tracking=false;
      const t=e.changedTouches[0];
      const dx=t.clientX-startX,dy=t.clientY-startY;
      const absDx=Math.abs(dx),absDy=Math.abs(dy);
      if(absDx<threshold&&absDy<threshold)return;
      if(absDx>absDy){dx>0?onSwipeRight?.():onSwipeLeft?.()}
      else{dy>0?onSwipeDown?.():onSwipeUp?.()}
    };
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchend',onEnd,{passive:true});
    return ()=>{el.removeEventListener('touchstart',onStart);el.removeEventListener('touchend',onEnd)};
  },[ref,onSwipeLeft,onSwipeRight,onSwipeUp,onSwipeDown,threshold]);
}

/* ─── Haptic Feedback ─── */
const haptic=(ms=12)=>{try{navigator.vibrate?.(ms)}catch(e){}};

/* ─── Long Press Hook ─── */
function useLongPress(callback,delay=500){
  const timerRef=useRef();
  const activeRef=useRef(false);
  const cbRef=useRef(callback);
  cbRef.current=callback;
  const start=useCallback(e=>{
    activeRef.current=false;
    timerRef.current=setTimeout(()=>{activeRef.current=true;haptic(20);cbRef.current?.(e)},delay);
  },[delay]);
  const cancel=useCallback(()=>{clearTimeout(timerRef.current)},[]);
  const click=useCallback(e=>{if(activeRef.current){e.preventDefault();e.stopPropagation();activeRef.current=false}},[]);
  return {onTouchStart:start,onTouchEnd:cancel,onTouchMove:cancel,onClickCapture:click};
}

/* ─── Animated Value (counter tick-up) ─── */
function AnimatedValue({value,duration=600,format}){
  const [display,setDisplay]=useState(value);
  const prevRef=useRef(value);
  useEffect(()=>{
    const from=typeof prevRef.current==='number'?prevRef.current:0;
    const to=typeof value==='number'?value:0;
    if(typeof value!=='number'||from===to){setDisplay(value);prevRef.current=value;return}
    const start=performance.now();
    const step=t=>{
      const p=Math.min(1,(t-start)/duration);
      const ease=1-Math.pow(1-p,3); // ease-out cubic
      setDisplay(Math.round(from+(to-from)*ease));
      if(p<1)requestAnimationFrame(step);
      else{setDisplay(to);prevRef.current=to}
    };
    requestAnimationFrame(step);
    prevRef.current=to;
  },[value,duration]);
  return format?format(display):display;
}

/* ─── Pull to Refresh ─── */
function PullToRefresh({onRefresh,children}){
  const [pulling,setPulling]=useState(false);
  const [refreshing,setRefreshing]=useState(false);
  const startYRef=useRef(0);
  const pullRef=useRef(0);
  const contentRef=useRef();

  const onTouchStart=e=>{
    if(contentRef.current&&contentRef.current.scrollTop===0){
      startYRef.current=e.touches[0].clientY;
    }else{startYRef.current=0}
  };
  const onTouchMove=e=>{
    if(!startYRef.current||refreshing)return;
    const dy=e.touches[0].clientY-startYRef.current;
    if(dy>20&&dy<120){setPulling(true);pullRef.current=dy}
    else if(dy<=0){setPulling(false);pullRef.current=0}
  };
  const onTouchEnd=()=>{
    if(pullRef.current>60&&!refreshing){
      setRefreshing(true);setPulling(false);
      haptic(15);
      Promise.resolve(onRefresh?.()).finally(()=>{setRefreshing(false)});
    }else{setPulling(false)}
    pullRef.current=0;startYRef.current=0;
  };

  return <div ref={contentRef} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={{flex:1,overflow:'auto'}}>
    <div className={`ptr-indicator ${pulling||refreshing?'pulling':''}`}>
      {refreshing?<><span className="ptr-spinner"/>Refreshing...</>:pulling?'Pull to refresh...':''}
    </div>
    {children}
  </div>;
}

/* ─── Touch Sortable List ─── */
function TouchSortable({items,renderItem,onReorder,keyFn}){
  const [dragIdx,setDragIdx]=useState(-1);
  const [overIdx,setOverIdx]=useState(-1);
  const startYRef=useRef(0);
  const dragActiveRef=useRef(false);
  const itemRefs=useRef([]);

  const onTouchStart=(e,idx)=>{
    startYRef.current=e.touches[0].clientY;
    dragActiveRef.current=false;
    // Start drag after 200ms hold
    const timer=setTimeout(()=>{
      dragActiveRef.current=true;
      setDragIdx(idx);
      haptic(15);
    },200);
    e.currentTarget._dragTimer=timer;
  };

  const onTouchMove=(e,idx)=>{
    if(!dragActiveRef.current){
      // Cancel drag if moved too much before hold triggered
      const dy=Math.abs(e.touches[0].clientY-startYRef.current);
      if(dy>10)clearTimeout(e.currentTarget._dragTimer);
      return;
    }
    e.preventDefault();
    // Find which item we're over
    const y=e.touches[0].clientY;
    for(let i=0;i<itemRefs.current.length;i++){
      const el=itemRefs.current[i];
      if(!el)continue;
      const rect=el.getBoundingClientRect();
      if(y>=rect.top&&y<=rect.bottom){setOverIdx(i);break}
    }
  };

  const onTouchEnd=(e,idx)=>{
    clearTimeout(e.currentTarget._dragTimer);
    if(dragActiveRef.current&&dragIdx>=0&&overIdx>=0&&dragIdx!==overIdx){
      onReorder?.(dragIdx,overIdx);
    }
    setDragIdx(-1);setOverIdx(-1);
    dragActiveRef.current=false;
  };

  return <div>{items.map((item,i)=>(
    <div key={keyFn?keyFn(item,i):i}
      ref={el=>itemRefs.current[i]=el}
      onTouchStart={e=>onTouchStart(e,i)}
      onTouchMove={e=>onTouchMove(e,i)}
      onTouchEnd={e=>onTouchEnd(e,i)}
      style={{
        opacity:dragIdx===i?.5:1,
        background:overIdx===i&&dragIdx>=0?'rgba(160,124,255,.08)':'transparent',
        transition:'background .15s,opacity .15s',
        touchAction:dragIdx>=0?'none':'auto',
      }}>
      {renderItem(item,i,dragIdx===i)}
    </div>
  ))}</div>;
}

/* ─── Swipe-to-Delete Item ─── */
function SwipeItem({children,onDismiss}){
  const ref=useRef();
  const [offset,setOffset]=useState(0);
  const startXRef=useRef(0);

  const onTouchStart=e=>{startXRef.current=e.touches[0].clientX;setOffset(0)};
  const onTouchMove=e=>{
    const dx=e.touches[0].clientX-startXRef.current;
    if(dx<0)setOffset(Math.max(-80,dx));
  };
  const onTouchEnd=()=>{
    if(offset<-60){onDismiss?.();try{navigator.vibrate?.(30)}catch(e){}}
    setOffset(0);
  };

  return <div ref={ref} style={{position:'relative',overflow:'hidden'}}
    onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
    <div style={{position:'absolute',right:0,top:0,bottom:0,width:80,background:'rgba(255,61,90,.15)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--red)',fontSize:16,opacity:offset<-20?1:0,transition:'opacity .15s'}}>{'✕'}</div>
    <div style={{transform:`translateX(${offset}px)`,transition:offset===0?'transform .2s':'none'}}>
      {children}
    </div>
  </div>;
}

  const [isOffline,setIsOffline]=useState(!navigator.onLine);
  const offlineQueueRef=useRef([]);
  const lastStatusTimeRef=useRef(null);

  const failCountRef=useRef(0);
  const lastFailTimeRef=useRef(0);
  const wsRef=useRef(null);
  const wsReconnectRef=useRef(null);

  // Process incoming status data (shared by both WS and poll)
  const processStatus=useCallback((st)=>{
    failCountRef.current=0;
    lastStatusTimeRef.current=Date.now();
    setStatus(st);
    if(st.weeklySchedule&&!schedDirtyRef.current)try{setWeekSched(JSON.parse(st.weeklySchedule))}catch(e){}
    if(st.profiles)try{setProfiles(JSON.parse(st.profiles))}catch(e){}

    if(st.playlistSettings)setPlSettings(st.playlistSettings);
  },[]);

  // Offline detection + command replay
  useEffect(()=>{
    const goOffline=()=>setIsOffline(true);
    const goOnline=()=>{
      setIsOffline(false);
      // Replay queued commands
      const q=offlineQueueRef.current.splice(0);
      if(q.length>0){
        toast(`Replaying ${q.length} queued command(s)`,'inf');
        q.forEach(({n,v})=>cmd(n,v).catch(()=>{}));
        setTimeout(poll,500);
      }
    };
    window.addEventListener('offline',goOffline);
    window.addEventListener('online',goOnline);
    return ()=>{window.removeEventListener('offline',goOffline);window.removeEventListener('online',goOnline)};
  },[poll]);

  // HTTP poll (fallback when WS unavailable)
  const poll=useCallback(async()=>{
    try{
      const st=await api('GET','/status');
      processStatus(st);
    }catch(e){
      if(e.message?.includes('401')||e.message?.includes('expired')){
        const now=Date.now();
        if(now-lastFailTimeRef.current<5000)return;
        lastFailTimeRef.current=now;
        failCountRef.current++;
        if(failCountRef.current===1)toast('Connection interrupted \u2014 retrying\u2026','inf');
        else if(failCountRef.current>=5){
          clearInterval(pollRef.current);wsRef.current?.close();
          S.u=S.t=null;setAuthed(false);toast('Session expired \u2014 please reconnect','err');
        }
      }
    }
  },[processStatus]);

  // WebSocket connection
  const connectWs=useCallback(()=>{
    if(!S.u||!S.t)return;
    try{
      const wsUrl=S.u.replace(/^http/,'ws')+'/ws?token='+encodeURIComponent(S.t);
      const ws=new WebSocket(wsUrl);
      ws.onopen=()=>{
        wsRef.current=ws;
        // Stop polling — WS takes over
        clearInterval(pollRef.current);pollRef.current=null;
      };
      ws.onmessage=(e)=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.type==='status'&&msg.data)processStatus(msg.data);
          else if(msg.type==='toast')toast(msg.message,msg.level||'inf');
          else if(msg.type==='response'&&!msg.success)toast(msg.message||'Command failed','err');
        }catch(ex){}
      };
      ws.onclose=()=>{
        wsRef.current=null;
        // Fall back to polling
        if(S.t&&!pollRef.current)pollRef.current=setInterval(poll,2500);
        // Try to reconnect WS after 5 seconds
        clearTimeout(wsReconnectRef.current);
        if(S.t)wsReconnectRef.current=setTimeout(connectWs,5000);
      };
      ws.onerror=()=>{ws.close()};
    }catch(e){
      // WS not supported or blocked — polling continues
      if(S.t&&!pollRef.current)pollRef.current=setInterval(poll,2500);
    }
  },[poll,processStatus]);

  // Send command via WS if available, else HTTP
  const wsSend=useCallback((cmd,value)=>{
    if(wsRef.current?.readyState===1){
      wsRef.current.send(JSON.stringify({cmd,value}));

          {/* v15.1: Suggestion banner */}
          {isWidgetVisible('suggestion')&&an?.suggestions?.length>0&&<div className="card" style={{border:'1px solid rgba(139,92,246,.15)',background:'rgba(139,92,246,.04)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>

              <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:'var(--grn)'}}>{an.sessionInsight.completed}/{an.sessionInsight.videos}</div><div style={{fontSize:9,color:'var(--mute)'}}>Completed</div></div>

            </div>
            {an.sessionInsight.avgDurationSec>0&&<div style={{fontSize:10,color:'var(--dim)',textAlign:'center',marginTop:4}}>
              {an.sessionInsight.durationSec>an.sessionInsight.avgDurationSec?'\u2191':'\u2193'} {Math.abs(Math.round((an.sessionInsight.durationSec-an.sessionInsight.avgDurationSec)/60))} min vs your average
            </div>}
          </div>}

          {/* Now Playing */}

            </div>:

              {st.currentVideo?.title&&<div className="np-meta">

              <div className="np-progress"><div className="np-bar" style={{width:pos+'%'}}/></div>
              <div className="np-time"><span>{fmtSec(curSec)}</span><span>{lenSec>0?fmtSec(lenSec):'--:--'}</span></div>

                const elapsed=(Date.now()-new Date(st.sessionStartedAt).getTime())/1000;
                const remain=o.maxTime*60-elapsed;
                return <div style={{textAlign:'center',fontFamily:'var(--mono)',fontSize:12,color:remain<60?'var(--red)':'var(--amber)',marginBottom:8}}>{remain>0?fmtSec(remain)+' remaining':'Expired'}</div>
              })()}

                <button className="btn-icon" onClick={()=>doCmd('skip')} aria-label="Skip">{'\u23ed'}</button>

                <div className="np-info-cell"><div className="k">Loop</div><div className="v">{o.loop!==undefined?(o.loop?'On':'Off'):'\u2014'}</div></div>
                <div className="np-info-cell"><div className="k">Queue</div><div className="v">{st.queueLength||0}</div></div>
              </div>
            </div>}
          </div>}

          {/* Streaks */}
          {an.streaks?<div className="card">
            <div className="card-title"><span className="ci">{'\ud83d\udd25'}</span> Streaks</div>

            {an.streaks.activeDates&&(()=>{
              const today=new Date();today.setHours(0,0,0,0);
              const activeSet=new Set(an.streaks.activeDates);
              const cells=[];
              for(let i=34;i>=0;i--){
                const d=new Date(today);d.setDate(d.getDate()-i);
                const key=d.toISOString().slice(0,10);
                const active=activeSet.has(key);
                const isToday=i===0;
                cells.push(<div key={i} title={key} style={{
                  width:12,height:12,borderRadius:2,
                  background:active?'rgba(160,124,255,.5)':'rgba(255,255,255,.03)',
                  boxShadow:active?'0 0 4px rgba(140,100,255,.3)':'none',
                  border:isToday?'1px solid var(--iris)':'1px solid transparent',
                  transition:'all .2s'
                }}/>);
              }
              return <div style={{display:'flex',gap:2,justifyContent:'center',flexWrap:'wrap',padding:'8px 0'}}>{cells}</div>;
            })()}
          </div>:<div className="card"><div className="card-title"><span className="ci">{'\ud83d\udd25'}</span> Streaks</div><Skeleton type="stats"/></div>}

            <div className="card-title"><span className="ci">{'\u2194'}</span> Period Comparison</div>

              {(()=>{
                const cmp=an.comparison;
                const wkDiff=cmp.thisWeek.totalSec-cmp.lastWeek.totalSec;
                const moDiff=cmp.thisMonth.totalSec-cmp.lastMonth.totalSec;
                const arrow=(v)=>v>0?'\u25b2':v<0?'\u25bc':'\u25cf';
                const color=(v)=>v>0?'var(--grn)':v<0?'var(--red)':'var(--mute)';
                return <>
                  <div style={{background:"var(--card)",border:"1px solid var(--bdr)",padding:12,borderRadius:'var(--r)',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'var(--mute)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}}>This Week</div>
                    <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700}}>{fmtSec(cmp.thisWeek.totalSec)}</div>

                    <div style={{fontSize:9,color:'var(--mute)',marginTop:4}}>{cmp.thisWeek.sessions} sessions \u00b7 {cmp.thisWeek.videos} videos</div>

                    <div style={{fontSize:9,color:'var(--mute)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}}>This Month</div>
                    <div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:700}}>{fmtSec(cmp.thisMonth.totalSec)}</div>

            </div>

            <div className="card-title" style={{marginBottom:4}}>

                {[7,30,90,365].map(d=>(
                  <button key={d} className={`btn ${trendDays===d?'btn-p':'btn-g'}`}
                    style={{padding:'3px 8px',fontSize:9}}

                ))}
              </div>
            </div>
            <TrendChart data={an.dailyTrend}/>
          </div>

          {/* Session Heatmap */}
          <div className="card">

                const cr=an.completionRates||[];const avgCr=cr.length?Math.round(cr.reduce((s,x)=>s+x.rate,0)/cr.length):0;
                const tv=an.topVideos||[];const totalSkips=tv.reduce((s,x)=>s+(x.skipped||0),0);const totalPlays=tv.reduce((s,x)=>s+(x.plays||0),0);
                const skipRate=totalPlays>0?Math.round(totalSkips/totalPlays*100):0;
                let sessWk='\u2014';if(sess.length>=2){const o=new Date(sess[sess.length-1].startedAt),n=new Date(sess[0].startedAt);const days=Math.max(1,(n-o)/864e5);sessWk=(sess.length/days*7).toFixed(1)}

            </div>

          {/* Session Timeline (clickable for replay) */}

                    <div style={{height:'100%',width:pct+'%',borderRadius:4,
                      background:s.panic?'linear-gradient(90deg,var(--red),rgba(255,61,90,.4))':'linear-gradient(90deg,var(--v2),var(--iris))',
                      transition:'width .4s ease'}}/>
                  </div>
                  <span style={{fontSize:9,color:s.panic?'var(--red)':'var(--dim)',fontFamily:'var(--mono)',minWidth:40,textAlign:'right'}}>{fmtSec(s.durationSec)}</span>
                  <span style={{fontSize:8,color:'var(--mute)',minWidth:16}}>{s.videos}v</span>
                </div>;
              })}
            </div>
          </div>}

          {/* Session Replay Modal */}
          {sessionEvents&&<div className="card" style={{border:'1px solid var(--iris)',boxShadow:'0 0 20px rgba(100,60,220,.1)'}}>

            <div style={{maxHeight:200,overflowY:'auto'}}>
              {(sessionEvents.events||[]).map((e,i)=>{
                const color=e.type==='panic'?'var(--red)':e.type==='video_skip'?'var(--amb)':e.type==='video_end'?'var(--grn)':'var(--dim)';
                return <div key={i} style={{display:'flex',gap:8,padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,.02)',fontSize:10}}>
                  <span style={{color:'var(--mute)',fontFamily:'var(--mono)',minWidth:60,flexShrink:0}}>{e.timestamp?.slice(11,19)||''}</span>
                  <span style={{color,fontWeight:600,minWidth:70}}>{e.type}</span>
                  <span style={{color:'var(--dim)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.url?trunc(e.url,60):e.data||''}</span>
                </div>;
              })}
              {!(sessionEvents.events||[]).length&&<div style={{color:'var(--mute)',fontSize:11,padding:8}}>No events recorded for this session</div>}
            </div>
          </div>}

          {/* Top Videos with Search + Thumbnails */}

            <div className="card-title"><span className="ci">{'\u2606'}</span> Top Videos</div>

                return <div key={i} className="tv-item" style={{cursor:'pointer',display:'flex',alignItems:'center',gap:8}} onClick={()=>loadVideoDetail(v.url)}>

                    <div className="tv-url" title={v.url}>{trunc(v.url,40)}</div>

                  </div>
                  <span className="tv-stats" style={{textAlign:'right',minWidth:48}}>{v.plays}x<br/><span style={{fontSize:8,color:compPct>70?'var(--grn)':'var(--amb)'}}>{compPct}%</span></span>
                </div>;
              })}
              {searchResults&&!searchResults.length&&<div style={{color:'var(--dim)',fontSize:11,padding:8,textAlign:'center'}}>No results for "{searchQuery}"</div>}
              {!searchResults&&!(an.topVideos?.length)&&<div style={{color:'var(--dim)',fontSize:11}}>No data yet.</div>}
            </div>
            {searchQuery&&<button className="btn btn-g" style={{width:'100%',marginTop:6,fontSize:10}} onClick={()=>{setSearchQuery('');setSearchResults(null)}}>Clear search</button>}
          </div>

          {/* v15.1: Smart Playlists */}
          {isWidgetVisible('smartplaylists')&&an?.smartPlaylists&&(an.smartPlaylists.mostWatched?.length>0||an.smartPlaylists.favorites?.length>0)&&<div className="card">
            <div className="card-title"><span className="ci">{'\u2726'}</span> Smart Playlists</div>

              const urls=an.smartPlaylists[key]||[];
              if(!urls.length)return null;
              return <div key={key} style={{marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:600,color:'var(--txt)'}}>{icon} {label} <span style={{color:'var(--mute)',fontWeight:400}}>({urls.length})</span></span>
                  <button className="btn btn-g" style={{fontSize:9,padding:'2px 8px'}} onClick={()=>{urls.forEach(u=>doCmd('appendurl',u,true));toast(`Queued ${urls.length} from ${label}`,'ok')}} aria-label={`Play ${label}`}>{'\u25b6'} Play</button>
                </div>
                <div style={{maxHeight:60,overflowY:'auto'}}>
                  {urls.slice(0,5).map((u,i)=><div key={i} style={{fontSize:10,color:'var(--dim)',padding:'1px 0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{trunc(u,55)}</div>)}

          {/* v15.2: Achievements */}
          {isWidgetVisible('achievements')&&an?.achievements?.length>0&&<div className="card">
            <div className="card-title"><span className="ci">{'\u2b50'}</span> Achievements <span style={{color:'var(--mute)',fontWeight:400,fontSize:11,marginLeft:4}}>{an.achievements.filter(a=>a.unlocked).length}/{an.achievements.length}</span></div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:6}}>
